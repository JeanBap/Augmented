name: Daily Netlify rebuild (drip publishing)

# Why this exists:
#   The sitemap generator filters out blog posts whose publishDate is in the
#   future. Without a daily rebuild, newly "published" posts would never drop
#   into the sitemap — they would only appear on the next manual git push.
#   This workflow triggers a Netlify build every day at 05:00 UTC so that any
#   post whose publishDate equals today becomes visible in sitemap-blog.xml.
#
# Setup (one-time):
#   1. In Netlify dashboard: Site settings -> Build & deploy -> Build hooks
#      -> Add build hook -> Name: "daily-rebuild" -> copy the webhook URL
#   2. In GitHub repo: Settings -> Secrets and variables -> Actions
#      -> New repository secret -> Name: NETLIFY_BUILD_HOOK_URL
#      -> Secret: the URL copied in step 1
#   3. Merge this workflow to main.

on:
  schedule:
    # 05:00 UTC daily. Adjust if you want a different time.
    - cron: '0 5 * * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  trigger-netlify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build hook
        env:
          HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::NETLIFY_BUILD_HOOK_URL secret is not set. See the comment at the top of this workflow for setup instructions."
            exit 1
          fi
          echo "Triggering Netlify build hook..."
          curl -fsSL -X POST -d '{}' "$HOOK_URL"
          echo "Build triggered."
