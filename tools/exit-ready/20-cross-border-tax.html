<script>
function fmt(n) {
  if(Math.abs(n) >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if(Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if(Math.abs(n) >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

// Tax rates by jurisdiction (long-term capital gains, approximate effective rate)
const jurisdictions = [
  { name: 'USA', longTerm: 0.20, shortTerm: 0.37, notes: 'Federal + 3.8% NIIT. State varies. Example: 20% federal.' },
  { name: 'UK', longTerm: 0.10, shortTerm: 0.20, notes: 'UK capital gains tax. First £3,000 tax-free (2024/25).' },
  { name: 'Canada', longTerm: 0.27, shortTerm: 0.27, notes: '50% inclusion rate on gains, then taxed at marginal rate ~27% effective.' },
  { name: 'Australia', longTerm: 0.24, shortTerm: 0.48, notes: '50% discount if held 12+ months. Short-term = no discount.' },
  { name: 'Singapore', longTerm: 0.00, shortTerm: 0.00, notes: 'No capital gains tax. Singapore tax resident treatment. Consult advisors.' },
  { name: 'UAE', longTerm: 0.00, shortTerm: 0.00, notes: 'No capital gains tax. Some activities may be subject to corporate tax.' },
  { name: 'Portugal', longTerm: 0.10, shortTerm: 0.28, notes: 'For non-residents, lower rates possible under NHR regime (pre-2024). Now ~10% standard.' },
  { name: 'Ireland', longTerm: 0.33, shortTerm: 0.33, notes: 'Capital gains tax 33%. Ireland corporate tax for companies 12.5%.' },
  { name: 'Switzerland', longTerm: 0.00, shortTerm: 0.00, notes: 'No federal capital gains tax. Cantonal taxes vary (typically 0-15% on wealth, not gains).' }
];

function compareTaxRates() {
  const gain = parseFloat(document.getElementById('capital-gain').value) || 10000000;
  const holdingPeriod = document.getElementById('holding-period').value;

  const rateType = holdingPeriod === 'short' ? 'shortTerm' : 'longTerm';

  // Calculate tax for each jurisdiction
  const results = jurisdictions.map(j => ({
    name: j.name,
    rate: j[rateType],
    tax: gain * j[rateType],
    netProceeds: gain - (gain * j[rateType]),
    notes: j.notes
  }));

  // Sort by net proceeds (best to worst)
  results.sort((a, b) => b.netProceeds - a.netProceeds);

  // Build table
  let html = `<thead><tr>
    <th>Jurisdiction</th>
    <th class="text-right">Tax Rate</th>
    <th class="text-right">Tax on ${fmt(gain)}</th>
    <th class="text-right">Net Proceeds</th>
    <th style="font-size: 0.7rem; padding: 0.5rem;">Notes</th>
  </tr></thead><tbody>`;

  results.forEach((r, idx) => {
    const highlight = idx === 0 ? 'highlight-best' : '';
    const zeroRate = r.rate === 0 ? 'flag-zero' : '';
    html += `
      <tr class="${highlight}">
        <td><strong>${r.name}</strong></td>
        <td class="text-right ${zeroRate}">${(r.rate * 100).toFixed(1)}%</td>
        <td class="text-right">${fmt(r.tax)}</td>
        <td class="text-right"><strong>${fmt(r.netProceeds)}</strong></td>
        <td style="font-size: 0.7rem; padding: 0.5rem; color: var(--mid);">${r.notes}</td>
      </tr>
    `;
  });
  html += '</tbody>';
  document.getElementById('r-table').innerHTML = html;

  // Introduction
  const intro = `Assuming a ${fmt(gain)} capital gain with ${holdingPeriod === 'short' ? 'short-term' : 'long-term'} holding period. The jurisdiction with the lowest tax (highlighted) preserves the most proceeds.`;
  document.getElementById('r-intro').innerHTML = intro;

  // Disclaimer
  const disclaimer = `<strong>Important Disclaimers:</strong><br />
    • These rates are simplified and may not reflect your specific situation<br />
    • Tax residency, citizenship, and domicile significantly affect your obligations<br />
    • Many jurisdictions have tax treaties that may reduce rates<br />
    • Some jurisdictions (Singapore, UAE, Switzerland) have specific conditions for tax-free treatment<br />
    • You must consult a qualified international tax advisor before structuring any transaction<br />
    • Rates shown are approximate and current as of 2024. Tax laws change frequently<br />
    • Relocating for tax purposes may trigger exit taxes in your current jurisdiction`;

  document.getElementById('r-disclaimer').innerHTML = disclaimer;
  document.getElementById('results').classList.add('visible');
}

function resetComparison() {
  document.getElementById('capital-gain').value = '';
  document.getElementById('holding-period').value = 'long';
  document.getElementById('results').classList.remove('visible');
}

// Pre-populate with example
document.getElementById('capital-gain').value = '10000000';
</script>

<script>document.addEventListener('DOMContentLoaded', function() { compareTaxRates(); });</script>
