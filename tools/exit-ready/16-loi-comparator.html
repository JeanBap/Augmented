<script>
let loiCount = 0;

function fmt(n) {
  if(Math.abs(n) >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if(Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if(Math.abs(n) >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

function initializeLOIs() {
  const container = document.getElementById('loi-container');
  container.innerHTML = '';
  for(let i = 0; i < 2; i++) {
    addLOI();
  }
}

function addLOI() {
  if(loiCount >= 4) {
    alert('Maximum 4 LOIs allowed');
    return;
  }

  const container = document.getElementById('loi-container');
  const id = loiCount++;
  const section = document.createElement('div');
  section.className = 'loi-section';
  section.id = 'loi-' + id;
  section.innerHTML = `
    <h3><span class="loi-number">LOI ${id + 1}</span><button class="remove-loi" onclick="removeLOI(${id})">Remove</button></h3>
    <div class="tool-row single">
      <div class="tool-field">
        <label for="loi-name-${id}">Bidder Name</label>
        <input type="text" id="loi-name-${id}" placeholder="Company Name" />
      </div>
    </div>
    <div class="tool-row triple">
      <div class="tool-field">
        <label for="loi-ev-${id}">Enterprise Value ($)</label>
        <input type="number" id="loi-ev-${id}" placeholder="0" />
      </div>
      <div class="tool-field">
        <label for="loi-cash-${id}">Cash at Close (%)</label>
        <input type="number" id="loi-cash-${id}" placeholder="100" min="0" max="100" />
      </div>
      <div class="tool-field">
        <label for="loi-earnout-${id}">Earnout Amount ($)</label>
        <input type="number" id="loi-earnout-${id}" placeholder="0" />
      </div>
    </div>
    <div class="tool-row triple">
      <div class="tool-field">
        <label for="loi-earnout-prob-${id}">Earnout Prob (%)</label>
        <input type="number" id="loi-earnout-prob-${id}" placeholder="100" min="0" max="100" />
      </div>
      <div class="tool-field">
        <label for="loi-escrow-${id}">Escrow/Holdback (%)</label>
        <input type="number" id="loi-escrow-${id}" placeholder="0" min="0" max="100" />
      </div>
      <div class="tool-field">
        <label for="loi-noncompete-${id}">Non-Compete (years)</label>
        <input type="number" id="loi-noncompete-${id}" placeholder="0" min="0" max="10" />
      </div>
    </div>
    <div class="tool-row triple">
      <div class="tool-field">
        <label for="loi-transition-${id}">Transition Period (mo)</label>
        <input type="number" id="loi-transition-${id}" placeholder="0" min="0" max="36" />
      </div>
      <div class="tool-field">
        <label for="loi-dd-${id}">Due Diligence (weeks)</label>
        <input type="number" id="loi-dd-${id}" placeholder="8" min="0" max="52" />
      </div>
      <div class="tool-field">
        <label for="loi-financing-${id}">Financing Contingency?</label>
        <select id="loi-financing-${id}">
          <option value="no">No (all-cash)</option>
          <option value="yes">Yes (has risk)</option>
        </select>
      </div>
    </div>
    <div class="tool-row single">
      <div class="tool-field">
        <label for="loi-certainty-${id}">Certainty of Close (1-5)</label>
        <input type="number" id="loi-certainty-${id}" placeholder="3" min="1" max="5" />
      </div>
    </div>
  `;
  container.appendChild(section);
}

function removeLOI(id) {
  const section = document.getElementById('loi-' + id);
  if(section) section.remove();
}

function compareLOIs() {
  const lois = [];
  document.querySelectorAll('.loi-section').forEach((section, idx) => {
    const id = section.id.split('-')[1];
    const name = document.getElementById('loi-name-' + id).value || `Bidder ${idx + 1}`;
    const ev = parseFloat(document.getElementById('loi-ev-' + id).value) || 0;
    const cashPct = (parseFloat(document.getElementById('loi-cash-' + id).value) || 100) / 100;
    const earnout = parseFloat(document.getElementById('loi-earnout-' + id).value) || 0;
    const earnoutProb = (parseFloat(document.getElementById('loi-earnout-prob-' + id).value) || 100) / 100;
    const escrow = (parseFloat(document.getElementById('loi-escrow-' + id).value) || 0) / 100;
    const certainty = parseFloat(document.getElementById('loi-certainty-' + id).value) || 3;

    if(ev > 0) {
      // Calculate certainty-adjusted value
      const cashAtClose = ev * cashPct;
      const escrowHold = ev * escrow;
      const availableAtClose = cashAtClose - escrowHold;
      const earnoutExpected = earnout * earnoutProb;
      const certaintyScoredValue = (availableAtClose + earnoutExpected * 0.5) * (certainty / 5);

      lois.push({
        name, ev, cashAtClose, earnout, earnoutProb, escrow, certainty,
        availableAtClose, earnoutExpected, certaintyScoredValue
      });
    }
  });

  if(lois.length === 0) {
    document.getElementById('results').classList.remove('visible');
    return;
  }

  // Sort by certainty-adjusted value
  lois.sort((a, b) => b.certaintyScoredValue - a.certaintyScoredValue);

  // Build comparison table
  let html = '<thead><tr><th>Rank</th><th>Bidder</th><th class="text-right">Enterprise Value</th><th class="text-right">At Close</th><th class="text-right">Earnout (Expected)</th><th class="text-right">Certainty-Adjusted</th></tr></thead><tbody>';

  lois.forEach((loi, idx) => {
    const rank = idx + 1;
    html += `
      <tr${rank === 1 ? ' style="background: rgba(200,164,90,0.1);"' : ''}>
        <td><strong>${rank}</strong></td>
        <td><strong>${loi.name}</strong></td>
        <td class="text-right">${fmt(loi.ev)}</td>
        <td class="text-right">${fmt(loi.availableAtClose)}</td>
        <td class="text-right">${fmt(loi.earnoutExpected)}</td>
        <td class="text-right"><strong>${fmt(loi.certaintyScoredValue)}</strong></td>
      </tr>
    `;
  });
  html += '</tbody>';
  document.getElementById('r-table').innerHTML = html;

  // Recommendation
  const winner = lois[0];
  const runner = lois.length > 1 ? lois[1] : null;
  let recText = `<strong>Recommendation: ${winner.name}</strong><br />`;
  if(runner) {
    const diff = winner.certaintyScoredValue - runner.certaintyScoredValue;
    const pctDiff = (diff / runner.certaintyScoredValue * 100).toFixed(1);
    recText += `${pctDiff}% higher adjusted value than ${runner.name}.<br />`;
  }
  recText += `Certainty of close: ${winner.certainty}/5. Cash at close: ${fmt(winner.availableAtClose)}.`;
  document.getElementById('r-recommendation').innerHTML = recText;

  // Analysis
  let analysis = '<strong>Details:</strong><br />';
  analysis += `${winner.name}: EV ${fmt(winner.ev)}, ${(winner.cashPct * 100).toFixed(0)}% cash at close, earnout of ${fmt(winner.earnout)} (${(winner.earnoutProb * 100).toFixed(0)}% probable).`;
  if(lois.length > 1) {
    analysis += ` Runner-up: ${runner.name} at ${fmt(runner.certaintyScoredValue)} adjusted value.`;
  }
  document.getElementById('r-analysis').innerHTML = analysis;

  document.getElementById('results').classList.add('visible');
}

function resetLOIs() {
  loiCount = 0;
  initializeLOIs();
  document.getElementById('results').classList.remove('visible');
}

// Initialize on load
initializeLOIs();
</script>

<script>document.addEventListener('DOMContentLoaded', function() { 
            if(typeof addLOI === 'function') {
                addLOI();
                setTimeout(function() {
                    var inputs = document.querySelectorAll('input,select');
                    inputs.forEach(function(inp) {
                        if(inp.id.includes('loi-name')) inp.value = 'Strategic Buyer A';
                        if(inp.id.includes('loi-ev') && !inp.id.includes('loi-ev-')) inp.value = '12000000';
                        if(inp.id.match(/loi-ev-/)) inp.value = '12000000';
                        if(inp.id.includes('loi-cash')) inp.value = '85';
                        if(inp.id.includes('loi-earnout-') && !inp.id.includes('prob')) inp.value = '2000000';
                        if(inp.id.includes('loi-earnout-prob')) inp.value = '60';
                        if(inp.id.includes('loi-escrow')) inp.value = '10';
                        if(inp.id.includes('loi-noncompete')) inp.value = '2';
                        if(inp.id.includes('loi-transition')) inp.value = '6';
                        if(inp.id.includes('loi-dd')) inp.value = '8';
                        if(inp.id.includes('loi-certainty')) inp.value = '4';
                    });
                    compareLOIs();
                }, 200);
            }
         });</script>
