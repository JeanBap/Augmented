<body data-page="tools">
<div id="site-nav"></div>
<a href="/tools/start-ready/" class="back-link">&larr; Back to Start Ready Tools</a>
<div class="tool-hero"><h1>Student Loan Repayment Simulator</h1><p>Chapter 7: Student Loans</p></div>
<div class="tool-container">
<div class="section">
<div class="grid">
<div><label>Total Loan Balance ($)</label><input type="number" id="bal" value="30000"></div>
<div><label>Interest Rate (%)</label><input type="number" id="rate" value="5.5" step="0.1"></div>
<div><label>Annual Gross Income ($)</label><input type="number" id="income" value="55000"></div>
<div><label>Income Growth (%/yr)</label><input type="number" id="growth" value="3" step="0.1"></div>
<div><label>Refinance Rate (% or 0 to skip)</label><input type="number" id="refi" value="4" step="0.1"></div>
</div>
<button onclick="calc()">Compare Repayment Plans</button>
</div><div id="res"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
let loanChart=null;
function calc(){
  const bal=parseFloat(document.getElementById('bal').value)||0;
  const rate=(parseFloat(document.getElementById('rate').value)||5.5)/100;
  const income=parseFloat(document.getElementById('income').value)||0;
  const growth=(parseFloat(document.getElementById('growth').value)||3)/100;
  const refiRate=(parseFloat(document.getElementById('refi').value)||0)/100;
  // Standard 10-year
  const mr=rate/12;const n=120;
  const stdPay=bal*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);
  const stdTotal=stdPay*n;const stdInterest=stdTotal-bal;
  // IDR (10% discretionary income, 20yr forgiveness)
  let idrBal=bal,idrTotal=0,idrInterest=0,idrMonths=0,idrIncome=income;
  for(let m=1;m<=240;m++){
    const mi=idrBal*rate/12;idrInterest+=mi;idrBal+=mi;
    if(m%12===1&&m>1)idrIncome*=(1+growth);
    const discretionary=Math.max(0,idrIncome-Math.max(idrIncome*0.15,22590))/12;
    const pay=Math.min(idrBal,discretionary*0.10);
    idrBal-=pay;idrTotal+=pay;idrMonths=m;
    if(idrBal<0.5)break;
  }
  const idrForgiven=Math.max(0,idrBal);idrBal=0;
  // Refinance
  let refiPay=0,refiTotal=0,refiInterest=0;
  if(refiRate>0){
    const rmr=refiRate/12;
    refiPay=bal*rmr*Math.pow(1+rmr,n)/(Math.pow(1+rmr,n)-1);
    refiTotal=refiPay*n;refiInterest=refiTotal-bal;
  }
  const chartLabels=['Total Interest','Total Paid'];
  const stdData=[stdInterest,stdTotal];
  const idrData=[idrInterest,idrTotal];
  const refiData=refiRate>0?[refiInterest,refiTotal]:null;
  if(loanChart)loanChart.destroy();
  const datasets=[
    {label:'Standard (10yr)',data:stdData,backgroundColor:'#10b981',borderRadius:4},
    {label:'Income-Driven',data:idrData,backgroundColor:'#7c5cfc',borderRadius:4}
  ];
  if(refiData)datasets.push({label:`Refinanced (${(refiRate*100).toFixed(1)}%)`,data:refiData,backgroundColor:'#c8a45a',borderRadius:4});
  document.getElementById('res').innerHTML=`
  <div style="position:relative;height:280px;margin-top:1rem;"><canvas id="loanChart" style="max-height:280px;"></canvas></div>
  <table style="margin-top:20px"><thead><tr><th>Plan</th><th>Monthly Payment</th><th>Total Interest</th><th>Total Paid</th><th>Timeline</th></tr></thead><tbody>
  <tr><td>Standard (10-year)</td><td>${fmt(stdPay)}</td><td>${fmt(stdInterest)}</td><td>${fmt(stdTotal)}</td><td>120 months</td></tr>
  <tr><td>Income-Driven (est.)</td><td>Varies</td><td>${fmt(idrInterest)}</td><td>${fmt(idrTotal)}${idrForgiven>0?' + '+fmt(idrForgiven)+' forgiven':''}</td><td>${idrForgiven>0?'240 months (forgiveness)':idrMonths+' months'}</td></tr>
  ${refiRate>0?`<tr><td>Refinanced (${(refiRate*100).toFixed(1)}%)</td><td>${fmt(refiPay)}</td><td>${fmt(refiInterest)}</td><td>${fmt(refiTotal)}</td><td>120 months</td></tr>`:''}
  </tbody></table>
  <div class="result-box" style="margin-top:16px"><h3>Analysis</h3>
  ${refiRate>0?`<div>Refinancing saves <strong>${fmt(stdInterest-refiInterest)}</strong> vs standard plan over 10 years.</div>`:''}
  ${idrForgiven>0?`<div>IDR results in ${fmt(idrForgiven)} forgiven after 20 years (note: forgiven amount may be taxable as income).</div>`:`<div>At your income level, IDR payments would pay off the loan in ${idrMonths} months.</div>`}
  <div class="sub" style="margin-top:8px">If balance-to-income ratio is below 1.0 (${(bal/income).toFixed(2)} here), the standard plan is typically optimal. Above 1.0, explore IDR with forgiveness.</div></div>`;
  setTimeout(()=>{loanChart=new Chart(document.getElementById('loanChart'),{type:'bar',
    data:{labels:chartLabels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}}}},
      scales:{x:{ticks:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{color:'rgba(255,255,255,0.08)',drawBorder:false}},
              y:{ticks:{callback:v=>'$'+v.toLocaleString(),color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{color:'rgba(255,255,255,0.08)',drawBorder:false}}}}});},0);
}
</script>
