<body data-page="tools">
<div id="site-nav"></div>
<a href="/tools/start-ready/" class="back-link">&larr; Back to Start Ready Tools</a>
<div class="tool-hero"><h1>Roth vs Traditional Comparison</h1><p>Chapter 12: Tax-Advantaged Accounts</p></div>
<div class="tool-container">
<div class="section">
<div class="grid">
<div><label>Annual Contribution ($)</label><input type="number" id="contrib" value="7000"></div>
<div><label>Years Until Retirement</label><input type="number" id="years" value="30"></div>
<div><label>Expected Annual Return (%)</label><input type="number" id="rate" value="7" step="0.1"></div>
<div><label>Current Marginal Tax Rate (%)</label><input type="number" id="taxnow" value="24"></div>
<div><label>Expected Retirement Tax Rate (%)</label><input type="number" id="taxret" value="22"></div>
</div>
<button onclick="calc()">Compare</button>
</div>
<div class="chart-wrap"><canvas id="chart"></canvas></div>
<div id="res"></div></div>
</div>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
let myChart=null;
function calc(){
  const contrib=parseFloat(document.getElementById('contrib').value)||0;
  const years=parseInt(document.getElementById('years').value)||30;
  const rate=(parseFloat(document.getElementById('rate').value)||7)/100;
  const taxNow=(parseFloat(document.getElementById('taxnow').value)||22)/100;
  const taxRet=(parseFloat(document.getElementById('taxret').value)||24)/100;
  const labels=[],rothData=[],tradData=[];
  let roth=0,trad=0;
  const rothAnnual=contrib*(1-taxNow);
  for(let y=0;y<=years;y++){
    labels.push('Year '+y);
    rothData.push(Math.round(roth));
    tradData.push(Math.round(trad*(1-taxRet)));
    roth=roth*(1+rate)+rothAnnual;
    trad=trad*(1+rate)+contrib;
  }
  const rothFinal=roth;
  const tradFinal=trad*(1-taxRet);
  const tradPretax=trad;
  if(myChart)myChart.destroy();
  myChart=new Chart(document.getElementById('chart'),{type:'line',
    data:{labels,datasets:[
      {label:'Roth (after-tax value)',data:rothData,borderColor:'#27ae60',fill:false},
      {label:'Traditional (after-tax value)',data:tradData,borderColor:'#2980B9',fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},
      scales:{y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K'}}}}
  });
  const winner=rothFinal>tradFinal?'Roth':'Traditional';
  document.getElementById('res').innerHTML=`
  <div class="grid" style="margin-top:16px">
    <div class="card ${winner==='Roth'?'green':''}"><div class="label">Roth IRA (After-Tax)</div><div class="value">${fmt(rothFinal)}</div><div class="sub">Tax paid upfront at ${(taxNow*100).toFixed(0)}%</div></div>
    <div class="card ${winner==='Traditional'?'green':''}"><div class="label">Traditional IRA (After-Tax)</div><div class="value">${fmt(tradFinal)}</div><div class="sub">Pre-tax balance: ${fmt(tradPretax)}, taxed at ${(taxRet*100).toFixed(0)}%</div></div>
  </div>
  <div class="result-box" style="margin-top:16px"><h3>${winner} Wins by ${fmt(Math.abs(rothFinal-tradFinal))}</h3>
  <div class="sub">${taxNow<taxRet?'Your current tax rate is lower than your expected retirement rate. Paying tax now (Roth) is the better deal.':taxNow>taxRet?'Your current tax rate is higher than your expected retirement rate. Deferring tax (Traditional) saves more.':'Rates are equal. Roth is generally preferred for flexibility (no required minimum distributions, tax-free withdrawals).'}</div></div>`;
}
</script>
