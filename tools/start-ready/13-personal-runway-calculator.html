<body data-page="tools">
<div id="site-nav"></div>
<a href="/tools/start-ready/" class="back-link">&larr; Back to Start Ready Tools</a>
<div class="tool-hero"><h1>Personal Runway Calculator</h1><p>Chapter 23: The Personal Finance of Taking the Leap</p></div>
<div class="tool-container">
<div class="section">
<div class="grid">
<div><label>Liquid Savings (checking + savings + brokerage) ($)</label><input type="number" id="sav" value="50000"></div>
<div><label>Monthly Current Spending ($)</label><input type="number" id="cur" value="4500"></div>
<div><label>Monthly Survival Spending (bare minimum) ($)</label><input type="number" id="surv" value="2800"></div>
<div><label>Expected Monthly Income During Startup ($)</label><input type="number" id="inc" value="0"></div>
</div>
<button onclick="calc()">Calculate Runway</button>
</div><div id="res"></div></div>
</div>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
function calc(){
  const sav=parseFloat(document.getElementById('sav').value)||0;
  const cur=parseFloat(document.getElementById('cur').value)||0;
  const surv=parseFloat(document.getElementById('surv').value)||0;
  const inc=parseFloat(document.getElementById('inc').value)||0;
  const flex=cur-surv;
  const burnComfort=Math.max(0.01,cur-inc);
  const burnSurvival=Math.max(0.01,surv-inc);
  const runwayComfort=sav/burnComfort;
  const runwaySurvival=sav/burnSurvival;
  function tag(months){
    if(months>=18)return'<span class="tag tag-green">Ready</span>';
    if(months>=12)return'<span class="tag tag-yellow">Cautious</span>';
    if(months>=6)return'<span class="tag tag-yellow">Risky</span>';
    return'<span class="tag tag-red">Not Ready</span>';
  }
  document.getElementById('res').innerHTML=`
  <div class="grid" style="margin-top:20px">
    <div class="card blue"><div class="label">Runway (Current Lifestyle)</div><div class="value">${runwayComfort.toFixed(1)} months</div><div class="sub">${tag(runwayComfort)}</div></div>
    <div class="card green"><div class="label">Runway (Survival Mode)</div><div class="value">${runwaySurvival.toFixed(1)} months</div><div class="sub">${tag(runwaySurvival)}</div></div>
  </div>
  <div class="result-box" style="margin-top:16px"><h3>Monthly Flex: ${fmt(flex)}</h3>
  <div>The gap between your current spending (${fmt(cur)}) and survival spending (${fmt(surv)}) is your shock absorber.</div>
  <div class="sub" style="margin-top:8px">${flex>=1500?'Strong flex. You have significant room to cut if needed.':flex>=500?'Moderate flex. You have some room to tighten.':'Minimal flex. Your current and survival spending are very close. Build more margin before taking the leap.'}</div></div>
  <table style="margin-top:16px"><thead><tr><th>Scenario</th><th>Monthly Burn</th><th>Runway</th><th>Status</th></tr></thead><tbody>
  <tr><td>Current lifestyle, zero income</td><td>${fmt(cur)}</td><td>${runwayComfort.toFixed(1)} mo</td><td>${tag(runwayComfort)}</td></tr>
  <tr><td>Survival mode, zero income</td><td>${fmt(surv)}</td><td>${runwaySurvival.toFixed(1)} mo</td><td>${tag(runwaySurvival)}</td></tr>
  ${inc>0?`<tr><td>Current lifestyle, ${fmt(inc)}/mo income</td><td>${fmt(burnComfort)}</td><td>${(sav/burnComfort).toFixed(1)} mo</td><td>${tag(sav/burnComfort)}</td></tr>
  <tr><td>Survival mode, ${fmt(inc)}/mo income</td><td>${fmt(burnSurvival)}</td><td>${(sav/burnSurvival).toFixed(1)} mo</td><td>${tag(sav/burnSurvival)}</td></tr>`:''}
  </tbody></table>`;
}
</script>
