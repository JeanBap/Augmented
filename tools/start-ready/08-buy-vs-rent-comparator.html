<div class="tool-hero"><h1>Buy vs Rent Comparator</h1><p>Chapter 17 & 19: Real Estate Decisions</p></div>
<div class="tool-container">
<div class="section"><h2>Buying Scenario</h2>
<div class="grid">
<div><label>Home Price ($)</label><input type="number" id="price" value="450000"></div>
<div><label>Down Payment (%)</label><input type="number" id="down" value="20"></div>
<div><label>Mortgage Rate (%)</label><input type="number" id="mrate" value="6.5" step="0.1"></div>
<div><label>Mortgage Term (years)</label><input type="number" id="term" value="30"></div>
<div><label>Property Tax Rate (%/yr)</label><input type="number" id="ptax" value="1.2" step="0.1"></div>
<div><label>Annual Maintenance (%)</label><input type="number" id="maint" value="1" step="0.1"></div>
<div><label>Home Appreciation (%/yr)</label><input type="number" id="appr" value="3" step="0.1"></div>
<div><label>Homeowners Insurance ($/mo)</label><input type="number" id="hins" value="150"></div>
</div></div>
<div class="section"><h2>Renting Scenario</h2>
<div class="grid">
<div><label>Monthly Rent ($)</label><input type="number" id="rent" value="2200"></div>
<div><label>Annual Rent Increase (%)</label><input type="number" id="rinc" value="3" step="0.1"></div>
<div><label>Investment Return (%)</label><input type="number" id="irate" value="7" step="0.1"></div>
</div></div>
<button onclick="calc()">Compare Over Time</button>
<div id="res"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
let rentChart=null;
function calc(){
  const price=parseFloat(document.getElementById('price').value)||0;
  const downPct=(parseFloat(document.getElementById('down').value)||20)/100;
  const mrate=(parseFloat(document.getElementById('mrate').value)||7)/100/12;
  const term=parseInt(document.getElementById('term').value)||30;
  const ptax=(parseFloat(document.getElementById('ptax').value)||1.2)/100;
  const maint=(parseFloat(document.getElementById('maint').value)||1)/100;
  const appr=(parseFloat(document.getElementById('appr').value)||3)/100;
  const hins=parseFloat(document.getElementById('hins').value)||0;
  const rent=parseFloat(document.getElementById('rent').value)||0;
  const rinc=(parseFloat(document.getElementById('rinc').value)||3)/100;
  const irate=(parseFloat(document.getElementById('irate').value)||7)/100/12;
  const downAmt=price*downPct;
  const loan=price-downAmt;
  const n=term*12;
  const mp=loan*mrate*Math.pow(1+mrate,n)/(Math.pow(1+mrate,n)-1);
  const pmi=downPct<0.2?loan*0.008/12:0;
  let rows='',chartLabels=[],buyData=[],rentData=[];
  for(const yr of [5,10,15,20,25,30]){
    if(yr>term)continue;
    let totalBuy=downAmt,totalRent=0,loanBal=loan,homeVal=price,rentPort=downAmt;
    let monthlyRent=rent;
    for(let m=1;m<=yr*12;m++){
      const interest=loanBal*mrate;
      const principal=mp-interest;
      loanBal-=principal;
      const buyCost=mp+price*Math.pow(1+appr,Math.floor((m-1)/12))*ptax/12+price*Math.pow(1+appr,Math.floor((m-1)/12))*maint/12+hins+(m<=240?pmi:0);
      totalBuy+=buyCost;
      if(m%12===0)monthlyRent=rent*Math.pow(1+rinc,m/12);
      totalRent+=monthlyRent;
      const diff=buyCost-monthlyRent;
      if(diff>0)rentPort=rentPort*(1+irate)+diff;
      else rentPort=rentPort*(1+irate);
      homeVal=price*Math.pow(1+appr,m/12);
    }
    const buyWealth=homeVal-Math.max(0,loanBal);
    const rentWealth=rentPort;
    const winner=buyWealth>rentWealth?'Buy':'Rent';
    chartLabels.push(yr+' yr');buyData.push(Math.round(buyWealth));rentData.push(Math.round(rentWealth));
    rows+=`<tr><td>${yr} years</td><td>${fmt(buyWealth)}</td><td>${fmt(rentWealth)}</td><td><span class="tag ${winner==='Buy'?'tag-green':'tag-yellow'}">${winner} wins by ${fmt(Math.abs(buyWealth-rentWealth))}</span></td></tr>`;
  }
  if(rentChart)rentChart.destroy();
  document.getElementById('res').innerHTML=`
  <div style="position:relative;height:280px;margin-top:1rem;"><canvas id="rentChart" style="max-height:280px;"></canvas></div>
  <div class="result-box" style="margin-top:16px"><h3>Monthly Cost of Buying</h3>
  <div>Mortgage: ${fmt(mp)} | Tax: ${fmt(price*ptax/12)} | Maintenance: ${fmt(price*maint/12)} | Insurance: ${fmt(hins)}${pmi>0?' | PMI: '+fmt(pmi):''}</div>
  <div class="big">${fmt(mp+price*ptax/12+price*maint/12+hins+pmi)}/month total</div>
  <div class="sub">vs ${fmt(rent)}/month rent</div></div>
  <table style="margin-top:16px"><thead><tr><th>Time</th><th>Buy (Net Equity)</th><th>Rent (Portfolio)</th><th>Winner</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="sub" style="margin-top:12px;padding:0 4px">Buy wealth = home value minus remaining mortgage. Rent wealth = down payment + monthly cost difference invested at ${((irate*12)*100).toFixed(0)}% return.</div>`;
  setTimeout(()=>{rentChart=new Chart(document.getElementById('rentChart'),{type:'line',
    data:{labels:chartLabels,datasets:[
      {label:'Buy Equity',data:buyData,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',borderWidth:2,tension:0.4,fill:true},
      {label:'Rent Portfolio',data:rentData,borderColor:'#c8a45a',backgroundColor:'rgba(200,164,90,0.1)',borderWidth:2,tension:0.4,fill:true}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}}}},
      scales:{x:{ticks:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{color:'rgba(255,255,255,0.08)',drawBorder:false}},
              y:{ticks:{callback:v=>'$'+v.toLocaleString(),color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{color:'rgba(255,255,255,0.08)',drawBorder:false}}}}});},0);
}
</script>
