<body data-page="tools">
<div id="site-nav"></div>
<a href="/tools/start-ready/" class="back-link">&larr; Back to Start Ready Tools</a>
<div class="tool-hero"><h1>The Three Numbers Dashboard</h1><p>Chapter 25: The Three Numbers That Tell You If You Are Ready</p></div>
<div class="tool-container">
<div class="section"><h2>Number 1: Personal Runway</h2>
<div class="grid">
<div><label>Liquid Savings (excl. retirement) ($)</label><input type="number" id="sav" value="42000"></div>
<div><label>Monthly Essential Expenses ($)</label><input type="number" id="exp" value="3200"></div>
</div></div>
<div class="section"><h2>Number 2: Monthly Flex</h2>
<div class="grid">
<div><label>Current Monthly Spending ($)</label><input type="number" id="cur" value="4500"></div>
<div><label>Survival Monthly Spending ($)</label><input type="number" id="surv" value="2800"></div>
</div></div>
<div class="section"><h2>Number 3: Non-Retirement Net Worth</h2>
<div class="grid">
<div><label>Total Assets (excl. retirement accounts) ($)</label><input type="number" id="assets" value="65000"></div>
<div><label>Total Liabilities ($)</label><input type="number" id="liab" value="12000"></div>
</div></div>
<button onclick="calc()">Assess Readiness</button>
<div id="res"></div></div>
</div>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
function calc(){
  const sav=parseFloat(document.getElementById('sav').value)||0;
  const exp=parseFloat(document.getElementById('exp').value)||1;
  const cur=parseFloat(document.getElementById('cur').value)||0;
  const surv=parseFloat(document.getElementById('surv').value)||0;
  const assets=parseFloat(document.getElementById('assets').value)||0;
  const liab=parseFloat(document.getElementById('liab').value)||0;
  const runway=sav/exp;
  const flex=cur-surv;
  const nw=assets-liab;
  function status(val,thresholds){
    if(val>=thresholds[2])return['Ready','green'];
    if(val>=thresholds[1])return['Cautious','yellow'];
    return['Not Ready','red'];
  }
  const s1=status(runway,[6,12,12]);
  const s2=status(flex,[500,500,1500]);
  const s3=status(nw,[0,0,50000]);
  const allReady=s1[0]==='Ready'&&s2[0]==='Ready'&&s3[0]==='Ready';
  const anyNotReady=s1[0]==='Not Ready'||s2[0]==='Not Ready'||s3[0]==='Not Ready';
  document.getElementById('res').innerHTML=`
  <div class="grid-3" style="margin-top:20px">
    <div class="card ${s1[1]}"><div class="label">Personal Runway</div><div class="value">${runway.toFixed(1)} mo</div><div class="sub">${s1[0]}</div></div>
    <div class="card ${s2[1]}"><div class="label">Monthly Flex</div><div class="value">${fmt(flex)}</div><div class="sub">${s2[0]}</div></div>
    <div class="card ${s3[1]}"><div class="label">Non-Retirement Net Worth</div><div class="value">${fmt(nw)}</div><div class="sub">${s3[0]}</div></div>
  </div>
  <div class="result-box" style="margin-top:16px;border-left-color:${allReady?'#27ae60':anyNotReady?'#e74c3c':'#f39c12'}">
    <h3>${allReady?'You Are Financially Ready':anyNotReady?'Not Yet Ready':'Proceed With Caution'}</h3>
    <div>${allReady?'All three numbers are in the Ready zone. Your personal finances will not be the reason your company fails.':anyNotReady?'At least one number is in the Not Ready zone. Address the red items before taking the leap.':'No critical gaps, but there is room to strengthen your position. Consider building more runway or flex before committing.'}</div>
  </div>
  <table style="margin-top:16px"><thead><tr><th>Number</th><th>Not Ready</th><th>Cautious</th><th>Ready</th><th>You</th></tr></thead><tbody>
  <tr><td>Runway</td><td>&lt; 6 months</td><td>6-12 months</td><td>12+ months</td><td><strong>${runway.toFixed(1)} mo</strong></td></tr>
  <tr><td>Monthly Flex</td><td>&lt; $500</td><td>$500-$1,500</td><td>&gt; $1,500</td><td><strong>${fmt(flex)}</strong></td></tr>
  <tr><td>Net Worth (ex-retirement)</td><td>Negative</td><td>$0-$50K</td><td>&gt; $50K</td><td><strong>${fmt(nw)}</strong></td></tr>
  </tbody></table>`;
}
</script>
