<body data-page="tools">
<div id="site-nav"></div>
<a href="/tools/start-ready/" class="back-link">&larr; Back to Start Ready Tools</a>
<div class="tool-hero"><h1>Credit Card True Cost Calculator</h1><p>Chapter 6: The Debt That Kills Quietly</p></div>
<div class="tool-container">
<div class="section">
<div class="grid">
<div><label>Current Balance ($)</label><input type="number" id="bal" value="8000"></div>
<div><label>APR (%)</label><input type="number" id="apr" value="22" step="0.1"></div>
<div><label>Minimum Payment (% of balance)</label><input type="number" id="minpct" value="2" step="0.1"></div>
<div><label>Fixed Payment Option ($/mo)</label><input type="number" id="fixed" value="250"></div>
</div>
<button onclick="calc()">Calculate True Cost</button>
</div><div id="res"></div></div>
</div>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
function sim(bal,apr,payment,isFixed){
  let total=0,interest=0,months=0;const mr=apr/100/12;
  let b=bal;
  while(b>0.5&&months<600){
    months++;
    const mi=b*mr;interest+=mi;b+=mi;
    const pay=isFixed?Math.min(b,payment):Math.min(b,Math.max(25,b*payment/100));
    b-=pay;total+=pay;
  }
  return{months,interest:Math.round(interest),total:Math.round(total)};
}
function calc(){
  const bal=parseFloat(document.getElementById('bal').value)||0;
  const apr=parseFloat(document.getElementById('apr').value)||0;
  const minpct=parseFloat(document.getElementById('minpct').value)||2;
  const fixed=parseFloat(document.getElementById('fixed').value)||0;
  const minResult=sim(bal,apr,minpct,false);
  const fixResult=sim(bal,apr,fixed,true);
  const saved=minResult.interest-fixResult.interest;
  document.getElementById('res').innerHTML=`
  <div class="grid" style="margin-top:20px">
    <div class="card red"><div class="label">Minimum Payments (${minpct}% of balance)</div>
      <div class="value">${minResult.months} months</div>
      <div class="sub">${(minResult.months/12).toFixed(1)} years to pay off</div>
      <div class="sub">Total interest: <strong>${fmt(minResult.interest)}</strong></div>
      <div class="sub">Total paid: ${fmt(minResult.total)}</div></div>
    <div class="card green"><div class="label">Fixed ${fmt(fixed)}/month</div>
      <div class="value">${fixResult.months} months</div>
      <div class="sub">${(fixResult.months/12).toFixed(1)} years to pay off</div>
      <div class="sub">Total interest: <strong>${fmt(fixResult.interest)}</strong></div>
      <div class="sub">Total paid: ${fmt(fixResult.total)}</div></div>
  </div>
  <div class="result-box" style="margin-top:16px"><h3>The Cost of Minimum Payments</h3>
  <div>You would pay <strong>${fmt(minResult.interest)}</strong> in interest on a ${fmt(bal)} balance. That is ${((minResult.interest/bal)*100).toFixed(0)}% of the original debt in pure interest.</div>
  <div style="margin-top:8px">Paying ${fmt(fixed)}/month instead saves <strong>${fmt(saved)}</strong> and gets you debt-free <strong>${minResult.months-fixResult.months} months sooner</strong>.</div></div>`;
}
</script>
