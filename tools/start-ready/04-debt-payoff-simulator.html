<body data-page="tools">
<div id="site-nav"></div>
<a href="/tools/start-ready/" class="back-link">&larr; Back to Start Ready Tools</a>
<div class="tool-hero"><h1>Debt Payoff Simulator</h1><p>Chapter 8: Getting Out of Debt</p></div>
<div class="tool-container">
<div class="section"><h2>Add Your Debts</h2>
<div class="row-add">
<div><label>Name</label><input type="text" id="dn" placeholder="Credit Card"></div>
<div><label>Balance ($)</label><input type="number" id="db" placeholder="5000"></div>
<div><label>APR (%)</label><input type="number" id="dr" placeholder="22" step="0.1"></div>
<div><label>Min Payment ($)</label><input type="number" id="dm" placeholder="100"></div>
<button onclick="addDebt()" style="margin-top:0">Add</button>
</div>
<table><thead><tr><th>Debt</th><th>Balance</th><th>APR</th><th>Min</th><th></th></tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="section">
<label>Extra Monthly Payment (above all minimums) ($)</label>
<input type="number" id="extra" placeholder="200" value="200">
<button onclick="calc()">Compare Avalanche vs Snowball</button>
</div>
<div id="res"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
let debts=[],debtChart=null;
function addDebt(){
  const n=document.getElementById('dn').value||'Debt '+(debts.length+1);
  const b=parseFloat(document.getElementById('db').value)||0;
  const r=parseFloat(document.getElementById('dr').value)||0;
  const m=parseFloat(document.getElementById('dm').value)||0;
  if(b<=0)return;
  debts.push({n,b,r,m});
  render();
  document.getElementById('dn').value='';document.getElementById('db').value='';document.getElementById('dr').value='';document.getElementById('dm').value='';
}
function removeDebt(i){debts.splice(i,1);render();}
function render(){
  document.getElementById('tbody').innerHTML=debts.map((d,i)=>`<tr><td>${d.n}</td><td>${fmt(d.b)}</td><td>${d.r}%</td><td>${fmt(d.m)}</td><td><button class="remove-btn" onclick="removeDebt(${i})">X</button></td></tr>`).join('');
}
function simulate(ds,extra,method){
  let arr=ds.map(d=>({...d,bal:d.b}));
  let totalInterest=0,months=0;
  while(arr.some(d=>d.bal>0)&&months<600){
    months++;
    arr.forEach(d=>{if(d.bal>0){const interest=d.bal*d.r/100/12;d.bal+=interest;totalInterest+=interest;}});
    arr.forEach(d=>{if(d.bal>0){const pay=Math.min(d.bal,d.m);d.bal-=pay;}});
    let ex=extra;
    const sorted=arr.filter(d=>d.bal>0).sort((a,b)=>method==='avalanche'?b.r-a.r:a.bal-b.bal);
    for(const d of sorted){if(ex<=0)break;const pay=Math.min(d.bal,ex);d.bal-=pay;ex-=pay;}
  }
  return{months,totalInterest};
}
function calc(){
  if(debts.length===0){document.getElementById('res').innerHTML='<div class="result-box" style="border-left-color:#e74c3c"><h3>Add at least one debt</h3></div>';return;}
  const extra=parseFloat(document.getElementById('extra').value)||0;
  const av=simulate(debts,extra,'avalanche');
  const sb=simulate(debts,extra,'snowball');
  const totalDebt=debts.reduce((s,d)=>s+d.b,0);
  const diff=sb.totalInterest-av.totalInterest;
  if(debtChart)debtChart.destroy();
  debtChart=new Chart(document.createElement('canvas').parentElement||document.body,{type:'bar',
    data:{labels:['Months to Payoff','Total Interest Paid'],datasets:[
      {label:'Avalanche',data:[av.months,av.totalInterest],backgroundColor:'#10b981',borderRadius:4},
      {label:'Snowball',data:[sb.months,sb.totalInterest],backgroundColor:'#7c5cfc',borderRadius:4}
    ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}}}},
      scales:{x:{ticks:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{color:'rgba(255,255,255,0.08)',drawBorder:false}},
              y:{ticks:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{drawBorder:false}}}}});
  const chartDiv=document.createElement('div');
  chartDiv.style.cssText='position:relative;height:200px;margin-top:1rem;';
  chartDiv.innerHTML='<canvas id="debtChart" style="max-height:200px;"></canvas>';
  if(debtChart)debtChart.destroy();
  debtChart=new Chart(document.getElementById('debtChart'),{type:'bar',
    data:{labels:['Months to Payoff','Total Interest Paid'],datasets:[
      {label:'Avalanche',data:[av.months,av.totalInterest],backgroundColor:'#10b981',borderRadius:4},
      {label:'Snowball',data:[sb.months,sb.totalInterest],backgroundColor:'#7c5cfc',borderRadius:4}
    ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}}}},
      scales:{x:{ticks:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{color:'rgba(255,255,255,0.08)',drawBorder:false}},
              y:{ticks:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{drawBorder:false}}}}});
  document.getElementById('res').innerHTML=`
  <div style="position:relative;height:200px;margin-top:1rem;"><canvas id="debtChart" style="max-height:200px;"></canvas></div>
  <div class="grid" style="margin-top:20px">
    <div class="card green"><div class="label">Avalanche (Highest Rate First)</div>
      <div class="value">${av.months} months</div>
      <div class="sub">Total interest: ${fmt(av.totalInterest)}</div>
      <div class="sub">Total paid: ${fmt(totalDebt+av.totalInterest)}</div></div>
    <div class="card blue"><div class="label">Snowball (Smallest Balance First)</div>
      <div class="value">${sb.months} months</div>
      <div class="sub">Total interest: ${fmt(sb.totalInterest)}</div>
      <div class="sub">Total paid: ${fmt(totalDebt+sb.totalInterest)}</div></div>
  </div>
  <div class="result-box" style="margin-top:16px">
    <h3>Comparison</h3>
    <div>Avalanche saves <strong>${fmt(diff)}</strong> in interest vs snowball.</div>
    <div>Avalanche is ${av.months<sb.months?av.months===sb.months?'the same speed':((sb.months-av.months)+' months faster'):(av.months-sb.months)+' months slower'}.</div>
    <div class="sub" style="margin-top:8px">${diff<200?'The difference is small. Pick the method you will stick with.':'The avalanche method saves meaningful money here. Use it if you have the discipline.'}</div>
  </div>`;
  setTimeout(()=>{debtChart=new Chart(document.getElementById('debtChart'),{type:'bar',
    data:{labels:['Months to Payoff','Total Interest Paid'],datasets:[
      {label:'Avalanche',data:[av.months,av.totalInterest],backgroundColor:'#10b981',borderRadius:4},
      {label:'Snowball',data:[sb.months,sb.totalInterest],backgroundColor:'#7c5cfc',borderRadius:4}
    ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}}}},
      scales:{x:{ticks:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{color:'rgba(255,255,255,0.08)',drawBorder:false}},
              y:{ticks:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}},grid:{drawBorder:false}}}}});},0);
}
</script>
