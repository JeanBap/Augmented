<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
.tool-hero{text-align:center;padding:3rem 2rem 2rem}
.tool-hero h1{font-family:var(--serif);font-size:clamp(1.6rem,4vw,2.4rem);margin-bottom:.5rem}
.tool-hero p{color:var(--mid);max-width:600px;margin:0 auto;font-size:.95rem;line-height:1.5}
.tool-hero .chapter-ref{font-family:var(--mono);font-size:.8rem;color:var(--gold);margin-top:.5rem}
.tool-container{max-width:800px;margin:0 auto;padding:0 2rem 3rem}
.section{margin-bottom:1.5rem}
.section h2{font-family:var(--serif);font-size:1.2rem;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--rule)}
label{display:block;font-family:var(--mono);font-size:.8rem;color:var(--mid);margin-bottom:.35rem}
input[type=number],input[type=text],input[type=date],select,textarea{width:100%;padding:.6rem .75rem;border:1px solid var(--rule);border-radius:6px;background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:.9rem;box-sizing:border-box;margin-bottom:.75rem}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
button{background:var(--gold);color:var(--paper);border:none;padding:.7rem 1.5rem;border-radius:6px;font-family:var(--mono);font-size:.85rem;font-weight:500;cursor:pointer;width:100%;transition:background .3s}
button:hover{background:var(--gold2)}
.result-box{background:rgba(200,164,90,.06);border-left:3px solid var(--gold);padding:1.25rem;border-radius:0 8px 8px 0;margin-top:1.25rem}
.result-box h3{font-family:var(--mono);font-size:.85rem;color:var(--gold);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.04em}
.result-box .big{font-family:var(--serif);font-size:1.8rem;color:var(--ink)}
.result-box .sub{font-size:.85rem;color:var(--mid);margin-top:.35rem;line-height:1.5}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.card{background:rgba(200,164,90,.04);border:1px solid var(--rule);border-radius:8px;padding:1rem;text-align:center}
.card .label{font-family:var(--mono);font-size:.75rem;color:var(--mid)}
.card .value{font-family:var(--serif);font-size:1.4rem;color:var(--ink);margin-top:.25rem}
.card.green{border-color:var(--green)}
.card.yellow{border-color:#f39c12}
.card.red{border-color:var(--red)}
.card.blue{border-color:var(--gold)}
table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.85rem}
th{background:var(--ink);color:var(--paper);padding:.6rem .75rem;text-align:left;font-family:var(--mono);font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
td{padding:.5rem .75rem;border-bottom:1px solid var(--rule);font-family:var(--mono);font-size:.85rem}
tr:nth-child(even){background:rgba(200,164,90,.03)}
.row-add{display:flex;gap:.5rem;margin-bottom:.75rem;align-items:end}
.row-add>div{flex:1}
.row-add button{width:auto;padding:.6rem 1rem;margin-bottom:.75rem}
.remove-btn{background:var(--red);color:var(--paper);border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:var(--mono);font-size:.75rem;width:auto}
.remove-btn:hover{background:#a93226}
.chart-wrap{margin:1.25rem 0;position:relative;height:300px}
.hidden{display:none}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-family:var(--mono);font-size:.75rem;font-weight:500}
.tag-green{background:rgba(39,174,96,.1);color:#1e8449}
.tag-yellow{background:rgba(243,156,18,.1);color:#b7950b}
.tag-red{background:rgba(192,57,43,.1);color:#c0392b}
.tool-footer{padding:1.25rem 2rem;text-align:center;font-family:var(--mono);font-size:.8rem;color:var(--mid);border-top:1px solid var(--rule);margin-top:2rem}
.tool-footer a{color:var(--gold);text-decoration:none}
.tool-footer a:hover{color:var(--gold2)}
.back-link{display:inline-block;font-family:var(--mono);font-size:.85rem;color:var(--gold);text-decoration:none;padding:1rem 2rem 0}
.back-link:hover{color:var(--gold2)}
.range-row{display:flex;align-items:center;gap:1rem;margin-bottom:.75rem}
.range-row input[type=range]{flex:1;margin:0}
.range-row .range-val{font-family:var(--mono);font-size:.85rem;min-width:60px;text-align:right}
@media(max-width:600px){.grid,.grid-3{grid-template-columns:1fr}.row-add{flex-wrap:wrap}}
</style>

<body data-page="tools">
<div id="site-nav"></div>
<a href="/tools/start-ready/" class="back-link">&larr; Back to Start Ready Tools</a>
<div class="tool-hero"><h1>Net Worth Calculator</h1><p>Chapter 1: Your Financial Starting Position</p></div>
<div class="tool-container">
<div class="section"><h2>Assets</h2>
<div class="grid">
<div><label>Checking Account</label><input type="number" id="a1" placeholder="0" value="0"></div>
<div><label>Savings Account</label><input type="number" id="a2" placeholder="0" value="0"></div>
<div><label>Retirement Accounts (401k, IRA)</label><input type="number" id="a3" placeholder="0" value="0"></div>
<div><label>Investment/Brokerage</label><input type="number" id="a4" placeholder="0" value="0"></div>
<div><label>Car (Resale Value)</label><input type="number" id="a5" placeholder="0" value="0"></div>
<div><label>Real Estate Equity</label><input type="number" id="a6" placeholder="0" value="0"></div>
<div><label>Other Assets</label><input type="number" id="a7" placeholder="0" value="0"></div>
</div></div>
<div class="section"><h2>Liabilities</h2>
<div class="grid">
<div><label>Student Loans</label><input type="number" id="l1" placeholder="0" value="0"></div>
<div><label>Credit Card Balances</label><input type="number" id="l2" placeholder="0" value="0"></div>
<div><label>Car Loan</label><input type="number" id="l3" placeholder="0" value="0"></div>
<div><label>Mortgage Balance</label><input type="number" id="l4" placeholder="0" value="0"></div>
<div><label>Personal Loans</label><input type="number" id="l5" placeholder="0" value="0"></div>
<div><label>Other Liabilities</label><input type="number" id="l6" placeholder="0" value="0"></div>
</div></div>
<div class="section"><h2>Monthly Cash Flow</h2>
<div class="grid">
<div><label>Monthly After-Tax Income</label><input type="number" id="inc" placeholder="0" value="0"></div>
<div><label>Monthly Total Expenses</label><input type="number" id="exp" placeholder="0" value="0"></div>
</div></div>
<button onclick="calc()">Calculate Net Worth</button>
<div id="res" class="hidden"></div></div>
</div>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
function calc(){
  const g=id=>parseFloat(document.getElementById(id).value)||0;
  const assets=g('a1')+g('a2')+g('a3')+g('a4')+g('a5')+g('a6')+g('a7');
  const liab=g('l1')+g('l2')+g('l3')+g('l4')+g('l5')+g('l6');
  const nw=assets-liab;
  const inc=g('inc'), exp=g('exp'), sav=inc-exp;
  const rate=inc>0?((sav/inc)*100).toFixed(1):0;
  const cls=nw>=0?'green':'red';
  document.getElementById('res').className='';
  document.getElementById('res').innerHTML=`
  <div class="grid-3" style="margin-top:20px">
    <div class="card ${cls}"><div class="label">Net Worth</div><div class="value">${fmt(nw)}</div></div>
    <div class="card blue"><div class="label">Total Assets</div><div class="value">${fmt(assets)}</div></div>
    <div class="card"><div class="label">Total Liabilities</div><div class="value">${fmt(liab)}</div></div>
  </div>
  <div class="result-box" style="margin-top:16px">
    <h3>Monthly Cash Flow</h3>
    <div>Monthly savings: <strong>${fmt(sav)}</strong></div>
    <div>Savings rate: <strong>${rate}%</strong></div>
    <div class="sub">${rate>=20?'Excellent. You are building a strong foundation.':rate>=10?'Good progress. Aim for 20% as income grows.':rate>=0?'Positive, but slim. Look for ways to widen the gap.':'Negative cash flow. Expenses exceed income. This is priority one to fix.'}</div>
  </div>`;
}
</script>

<div class="tool-footer">From <a href="/book/#start-ready">Start Ready</a> by Yanni Papoutsi</div>

</body></html>
