<div class="tool-hero"><h1>Tax-Advantaged Account Optimizer</h1><p>Chapter 12: Tax-Advantaged Accounts</p></div>
<div class="tool-container">
<div class="section">
<div class="grid">
<div><label>Annual Gross Income ($)</label><input type="number" id="income" value="95000"></div>
<div><label>Total Available for Retirement Savings ($/yr)</label><input type="number" id="budget" value="20000"></div>
<div><label>Employer 401(k) Match (%)</label><input type="number" id="match" value="50" step="1"></div>
<div><label>Employer Match Cap (% of salary)</label><input type="number" id="cap" value="6" step="1"></div>
<div><label>Access to HSA-Eligible Health Plan?</label><select id="hsa"><option value="1" selected>Yes</option><option value="0">No</option></select></div>
<div><label>Current Marginal Tax Rate (%)</label><input type="number" id="tax" value="24"></div>
</div>
<button onclick="calc()">Optimize Allocation</button>
</div><div id="res"></div></div>
</div>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
function calc(){
  const income=parseFloat(document.getElementById('income').value)||0;
  const budget=parseFloat(document.getElementById('budget').value)||0;
  const matchPct=(parseFloat(document.getElementById('match').value)||0)/100;
  const capPct=(parseFloat(document.getElementById('cap').value)||0)/100;
  const hasHSA=document.getElementById('hsa').value==='1';
  const tax=(parseFloat(document.getElementById('tax').value)||22)/100;
  const limits={k401:23000,ira:7000,hsa:4150};
  let remaining=budget;
  let steps=[];
  // Step 1: 401k match
  const matchSalary=income*capPct;
  const needed401kForMatch=matchSalary;
  const s1=Math.min(remaining,needed401kForMatch,limits.k401);
  const matchValue=Math.min(s1,matchSalary)*matchPct;
  if(s1>0){steps.push({acct:'401(k) (to capture match)',amt:s1,reason:`${(matchPct*100).toFixed(0)}% match = ${fmt(matchValue)} free money. This is a ${(matchPct*100).toFixed(0)}% guaranteed return.`,free:matchValue,priority:1});}
  remaining-=s1;
  // Step 2: HSA if available
  let s2=0;
  if(hasHSA){s2=Math.min(remaining,limits.hsa);
  if(s2>0){steps.push({acct:'HSA',amt:s2,reason:'Triple tax advantage: deductible going in, tax-free growth, tax-free withdrawals for medical. The most tax-efficient account that exists.',free:0,priority:2});}
  remaining-=s2;}
  // Step 3: Roth IRA
  const s3=Math.min(remaining,limits.ira);
  if(s3>0){steps.push({acct:'Roth IRA',amt:s3,reason:`Tax-free growth and withdrawals. At ${(tax*100).toFixed(0)}% marginal rate, paying tax now is likely cheaper than in retirement.`,free:0,priority:3});}
  remaining-=s3;
  // Step 4: Additional 401k
  const s4=Math.min(remaining,limits.k401-s1);
  if(s4>0){steps.push({acct:'401(k) (additional)',amt:s4,reason:'Tax-deferred growth. Reduces current taxable income.',free:0,priority:4});}
  remaining-=s4;
  // Step 5: Taxable brokerage
  if(remaining>0){steps.push({acct:'Taxable Brokerage',amt:remaining,reason:'No tax advantage, but still better than savings. Use tax-efficient index funds.',free:0,priority:5});}
  const totalFree=steps.reduce((s,st)=>s+st.free,0);
  const totalAllocated=budget-remaining;
  const taxSaved=((s1+s4)*tax)+(s2*tax);
  document.getElementById('res').innerHTML=`
  <h2 style="margin-top:20px">Optimal Allocation Order</h2>
  <table><thead><tr><th>#</th><th>Account</th><th>Amount</th><th>Why</th></tr></thead><tbody>
  ${steps.map((s,i)=>`<tr><td>${i+1}</td><td>${s.acct}</td><td><strong>${fmt(s.amt)}</strong>${s.free>0?'<div style="font-size:0.8rem;color:#27ae60">+'+fmt(s.free)+' employer match</div>':''}</td><td style="font-size:0.85rem">${s.reason}</td></tr>`).join('')}
  </tbody></table>
  <div class="grid" style="margin-top:16px">
    <div class="card green"><div class="label">Free Money (Employer Match)</div><div class="value">${fmt(totalFree)}</div></div>
    <div class="card blue"><div class="label">Estimated Tax Savings</div><div class="value">${fmt(taxSaved)}</div><div class="sub">From pre-tax contributions</div></div>
  </div>
  <div class="result-box" style="margin-top:16px"><h3>Total Annual Benefit: ${fmt(totalFree+taxSaved)}</h3>
  <div class="sub">This is ${fmt(totalFree)} in employer match plus ${fmt(taxSaved)} in tax savings. These are guaranteed returns before any investment growth.</div></div>`;
}
</script>
