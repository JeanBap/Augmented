<body data-page="tools">
<div id="site-nav"></div>
<a href="/tools/start-ready/" class="back-link">&larr; Back to Start Ready Tools</a>
<div class="tool-hero"><h1>Emergency Fund Target Calculator</h1><p>Chapter 4: The Emergency Fund</p></div>
<div class="tool-container">
<div class="section">
<label>Monthly Essential Expenses ($)</label>
<input type="number" id="exp" placeholder="2500" value="3500">
<label>Your Situation</label>
<select id="sit">
<option value="3">Stable job, no dependants, family safety net</option>
<option value="4.5">Stable job, with dependants</option>
<option value="6" selected>Self-employed or volatile industry</option>
<option value="9">Planning to start a business</option>
<option value="12">Starting a business (founder track)</option>
</select>
<label>Current Emergency Savings ($)</label>
<input type="number" id="cur" placeholder="0" value="8000">
<label>Monthly Amount You Can Save ($)</label>
<input type="number" id="sav" placeholder="400" value="500">
<button onclick="calc()">Calculate Target</button>
</div><div id="res"></div></div>
</div>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
function calc(){
  const exp=parseFloat(document.getElementById('exp').value)||0;
  const months=parseFloat(document.getElementById('sit').value);
  const cur=parseFloat(document.getElementById('cur').value)||0;
  const sav=parseFloat(document.getElementById('sav').value)||0;
  const target=exp*months;
  const gap=Math.max(0,target-cur);
  const monthsToTarget=sav>0?Math.ceil(gap/sav):Infinity;
  const pct=target>0?Math.min(100,(cur/target*100)).toFixed(0):0;
  const cls=pct>=100?'green':pct>=50?'yellow':'red';
  document.getElementById('res').innerHTML=`
  <div class="grid" style="margin-top:16px">
    <div class="card ${cls}"><div class="label">Target Emergency Fund</div><div class="value">${fmt(target)}</div><div class="sub">${months} months of expenses</div></div>
    <div class="card blue"><div class="label">Current Progress</div><div class="value">${pct}%</div><div class="sub">${fmt(cur)} saved</div></div>
  </div>
  ${gap>0?`<div class="result-box" style="margin-top:16px"><h3>Gap: ${fmt(gap)}</h3>
  <div>At ${fmt(sav)}/month, you will reach your target in <strong>${monthsToTarget} months</strong> (${(monthsToTarget/12).toFixed(1)} years).</div>
  <div class="sub">Keep this in a high-yield savings account. Do not invest it.</div></div>`
  :`<div class="result-box" style="margin-top:16px;border-left-color:#27ae60"><h3>Fully Funded</h3><div>Your emergency fund meets or exceeds your target. Redirect savings to debt payoff or investing.</div></div>`}`;
}
</script>
