<div class="tool-hero"><h1>Mortgage Affordability Calculator</h1><p>Chapter 19: Buying Your First Home</p></div>
<div class="tool-container">
<div class="section">
<div class="grid">
<div><label>Annual Gross Income ($)</label><input type="number" id="income" value="120000"></div>
<div><label>Monthly Debt Payments (excl. mortgage) ($)</label><input type="number" id="debt" value="400"></div>
<div><label>Down Payment Available ($)</label><input type="number" id="down" value="80000"></div>
<div><label>Mortgage Rate (%)</label><input type="number" id="rate" value="6.5" step="0.1"></div>
<div><label>Loan Term (years)</label><input type="number" id="term" value="30"></div>
<div><label>Property Tax Rate (%/yr)</label><input type="number" id="ptax" value="1.2" step="0.1"></div>
<div><label>Homeowners Insurance ($/mo)</label><input type="number" id="ins" value="150"></div>
</div>
<button onclick="calc()">Calculate</button>
</div><div id="res"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
let mortgageChart=null;
function calc(){
  const income=parseFloat(document.getElementById('income').value)||0;
  const debt=parseFloat(document.getElementById('debt').value)||0;
  const down=parseFloat(document.getElementById('down').value)||0;
  const rate=(parseFloat(document.getElementById('rate').value)||7)/100/12;
  const term=(parseInt(document.getElementById('term').value)||30)*12;
  const ptax=(parseFloat(document.getElementById('ptax').value)||1.2)/100;
  const ins=parseFloat(document.getElementById('ins').value)||0;
  const monthlyIncome=income/12;
  // Bank says: 43% DTI
  const bankMaxPayment=monthlyIncome*0.43-debt;
  // Safe: 28% housing ratio
  const safeMaxPayment=monthlyIncome*0.28;
  // Stress: can you afford at 20% income drop?
  const stressMaxPayment=(monthlyIncome*0.8)*0.28;
  function priceFromPayment(maxPay){
    const housingBudget=maxPay-ins;
    // Iteratively solve: mortgage + taxes = housingBudget
    // mortgage = loan * rate * (1+rate)^n / ((1+rate)^n - 1)
    // taxes = price * ptax / 12
    // price = loan + down
    // Approximate: try a few iterations
    let price=down;
    for(let i=0;i<20;i++){
      const loan=Math.max(0,price-down);
      const mp=loan>0?loan*rate*Math.pow(1+rate,term)/(Math.pow(1+rate,term)-1):0;
      const taxes=price*ptax/12;
      const totalPay=mp+taxes+ins;
      const diff=maxPay-totalPay;
      price+=diff*100;// rough adjustment
      if(Math.abs(diff)<1)break;
    }
    return Math.max(0,Math.round(price));
  }
  const bankPrice=priceFromPayment(bankMaxPayment);
  const safePrice=priceFromPayment(safeMaxPayment);
  const stressPrice=priceFromPayment(stressMaxPayment);
  const pmi=down/safePrice<0.2?'Yes (add 0.5-1.5% of loan/yr)':'No';
  const loan=Math.max(0,safePrice-down);
  const mp=loan>0?loan*rate*Math.pow(1+rate,term)/(Math.pow(1+rate,term)-1):0;
  const taxes=safePrice*ptax/12;
  const totalMonthly=mp+taxes+ins;
  const pmiMo=down/safePrice<0.2?loan*0.01/12:0;
  if(mortgageChart)mortgageChart.destroy();
  document.getElementById('res').innerHTML=`
  <div style="position:relative;height:280px;margin-top:1rem;"><canvas id="mortgageChart" style="max-height:280px;"></canvas></div>
  <div class="grid-3" style="margin-top:20px">
    <div class="card red"><div class="label">Bank Says</div><div class="value">${fmt(bankPrice)}</div><div class="sub">43% DTI limit</div></div>
    <div class="card green"><div class="label">Safe Number</div><div class="value">${fmt(safePrice)}</div><div class="sub">28% housing ratio</div></div>
    <div class="card blue"><div class="label">Stress-Tested</div><div class="value">${fmt(stressPrice)}</div><div class="sub">Affordable at 20% income drop</div></div>
  </div>
  <div class="result-box" style="margin-top:16px"><h3>Recommendation: Target ${fmt(stressPrice)} - ${fmt(safePrice)}</h3>
  <div>The bank will approve up to ${fmt(bankPrice)}. That number is designed to maximise the loan, not protect you. The safe number (${fmt(safePrice)}) keeps housing at 28% of gross income. The stress-tested number (${fmt(stressPrice)}) ensures you can still pay if your income drops 20%.</div>
  <div class="sub" style="margin-top:8px">Down payment: ${fmt(down)} (${(down/safePrice*100).toFixed(1)}% of safe price). PMI required: ${pmi}.</div></div>`;
  setTimeout(()=>{mortgageChart=new Chart(document.getElementById('mortgageChart'),{type:'doughnut',
    data:{labels:['Mortgage (Principal+Interest)','Property Tax','Insurance','PMI'],
          datasets:[{data:[mp,taxes,ins,pmiMo],backgroundColor:['#10b981','#7c5cfc','#c8a45a','#ef4444']}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{family:"'DM Mono', monospace"}}}},
      tooltips:{callbacks:{label:function(ctx){return fmt(ctx.parsed)}}}}});},0);
}
</script>
