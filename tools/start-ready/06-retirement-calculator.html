<a href="/tools/start-ready/" class="back-link">&larr; Back to Start Ready Tools</a>
<div class="tool-hero"><h1>Retirement Number Calculator</h1><p>Chapter 16: Retirement Accounts in Practice</p></div>
<div class="tool-container">
<div class="section">
<div class="grid">
<div><label>Desired Annual Spending in Retirement ($)</label><input type="number" id="spend" value="60000"></div>
<div><label>Current Age</label><input type="number" id="age" value="25"></div>
<div><label>Target Retirement Age</label><input type="number" id="retire" value="60"></div>
<div><label>Current Retirement Savings ($)</label><input type="number" id="cur" value="10000"></div>
<div><label>Expected Annual Return (%)</label><input type="number" id="rate" value="7" step="0.1"></div>
<div><label>Withdrawal Rate (%)</label><input type="number" id="wr" value="4" step="0.1"></div>
</div>
<button onclick="calc()">Calculate</button>
</div><div id="res"></div></div>
</div>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n)}
function calc(){
  const spend=parseFloat(document.getElementById('spend').value)||0;
  const age=parseInt(document.getElementById('age').value)||25;
  const retAge=parseInt(document.getElementById('retire').value)||60;
  const cur=parseFloat(document.getElementById('cur').value)||0;
  const rate=(parseFloat(document.getElementById('rate').value)||7)/100;
  const wr=(parseFloat(document.getElementById('wr').value)||4)/100;
  const target=spend/wr;
  const years=retAge-age;
  if(years<=0){document.getElementById('res').innerHTML='<div class="result-box" style="border-left-color:#e74c3c"><h3>Retirement age must be greater than current age</h3></div>';return;}
  const mr=rate/12;
  const months=years*12;
  const fvCur=cur*Math.pow(1+mr,months);
  const gap=Math.max(0,target-fvCur);
  const monthly=gap>0?gap*mr/(Math.pow(1+mr,months)-1):0;
  const scenarios=[
    {y:years,m:monthly},
    {y:Math.max(1,years-5),m:gap>0?Math.max(0,target-cur*Math.pow(1+mr,(years-5)*12))*mr/(Math.pow(1+mr,(years-5)*12)-1):0},
    {y:years+5,m:gap>0?Math.max(0,target-cur*Math.pow(1+mr,(years+5)*12))*mr/(Math.pow(1+mr,(years+5)*12)-1):0},
  ];
  document.getElementById('res').innerHTML=`
  <div class="result-box" style="margin-top:16px"><h3>Your Retirement Number</h3>
  <div class="big">${fmt(target)}</div>
  <div class="sub">${fmt(spend)}/year at ${wr*100}% withdrawal rate = ${(1/wr).toFixed(0)}x annual spending</div></div>
  <div class="result-box" style="margin-top:12px"><h3>Monthly Savings Needed</h3>
  <div class="big">${fmt(monthly)}/month</div>
  <div class="sub">To grow ${fmt(cur)} to ${fmt(target)} in ${years} years at ${(rate*100).toFixed(0)}% returns.</div></div>
  <table style="margin-top:16px"><thead><tr><th>Retire At</th><th>Years Left</th><th>Monthly Needed</th></tr></thead><tbody>
  <tr><td>${retAge-5}</td><td>${years-5}</td><td>${fmt(scenarios[1].m)}/mo</td></tr>
  <tr style="font-weight:bold"><td>${retAge}</td><td>${years}</td><td>${fmt(monthly)}/mo</td></tr>
  <tr><td>${retAge+5}</td><td>${years+5}</td><td>${fmt(scenarios[2].m)}/mo</td></tr>
  </tbody></table>`;
}
</script>
