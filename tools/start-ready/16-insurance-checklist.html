<div class="tool-hero"><h1>Insurance Needs Checklist</h1><p>Chapter 20: Insurance You Actually Need</p></div>
<div class="tool-container">
<div class="section"><h2>Your Situation</h2><div style="margin-bottom:16px"><label style="font-weight:bold">Do you have dependants who rely on your income?</label><select id="dep" style="margin-top:4px"><option value="0">No</option><option value="1" selected>Yes, 1-2</option><option value="2">Yes, 3+</option></select></div><div style="margin-bottom:16px"><label style="font-weight:bold">Employment status?</label><select id="emp" style="margin-top:4px"><option value="0">Employed (employer benefits)</option><option value="1" selected>Self-employed</option><option value="2">Unemployed/transitioning</option></select></div><div style="margin-bottom:16px"><label style="font-weight:bold">Do you rent or own?</label><select id="home" style="margin-top:4px"><option value="0">Rent</option><option value="1" selected>Own (with mortgage)</option><option value="2">Own (no mortgage)</option></select></div><div style="margin-bottom:16px"><label style="font-weight:bold">Do you own a car?</label><select id="car" style="margin-top:4px"><option value="0">No</option><option value="1" selected>Yes, worth > $5K</option><option value="2">Yes, worth < $5K</option></select></div><div style="margin-bottom:16px"><label style="font-weight:bold">Annual income range?</label><select id="inc" style="margin-top:4px"><option value="0">Under $50K</option><option value="1" selected>$50K-$150K</option><option value="2">Over $150K</option></select></div><div style="margin-bottom:16px"><label style="font-weight:bold">Do you have significant savings/assets?</label><select id="save" style="margin-top:4px"><option value="0">Under $10K</option><option value="1" selected>$10K-$100K</option><option value="2">Over $100K</option></select></div>
<button onclick="calc()">Get Recommendations</button>
</div><div id="res"></div></div>
</div>
<script>
function calc(){
  const g=id=>parseInt(document.getElementById(id).value);
  const dep=g('dep'),emp=g('emp'),home=g('home'),car=g('car'),inc=g('inc'),save=g('save');
  let recs=[];
  // Health
  if(emp===0)recs.push({name:'Health Insurance',priority:'Essential',note:'Covered through employer. Review plan annually to optimise premium vs deductible.','cls':'green'});
  else recs.push({name:'Health Insurance',priority:'Critical',note:'You need individual coverage. Check healthcare.gov marketplace or professional associations for group rates.','cls':'red'});
  // Disability
  if(inc>=1)recs.push({name:'Long-Term Disability',priority:'Essential',note:'Your income is your most valuable asset. Get own-occupation coverage replacing 60-70% of income.'+(emp===0?' Check if employer provides base coverage.':''),'cls':'green'});
  else recs.push({name:'Long-Term Disability',priority:'Recommended',note:'Worth having at any income level. Employer plans are cheapest if available.','cls':'yellow'});
  // Life
  if(dep>0)recs.push({name:'Term Life Insurance',priority:'Essential',note:'Get '+(inc>=2?'15':'10')+'-year term for 10-15x annual income. Skip whole life.','cls':'green'});
  else recs.push({name:'Term Life Insurance',priority:'Not needed yet',note:'No dependants means nobody relies on your income. Revisit when that changes.','cls':'yellow'});
  // Renters/Home
  if(home===0)recs.push({name:'Renters Insurance',priority:'Essential',note:'Typically $15-30/month. Covers possessions + liability. No reason not to have it.','cls':'green'});
  else if(home===1)recs.push({name:'Homeowners Insurance',priority:'Required',note:'Required by your mortgage lender. Review coverage annually and increase deductible to lower premium.','cls':'green'});
  else recs.push({name:'Homeowners Insurance',priority:'Recommended',note:'Not required without a mortgage but protects your largest asset. High-deductible plan is cost-effective.','cls':'yellow'});
  // Auto
  if(car>0){
    if(car===1)recs.push({name:'Auto Insurance (Full)',priority:'Essential',note:'Liability + collision + comprehensive. Car value justifies full coverage.','cls':'green'});
    else recs.push({name:'Auto Insurance (Liability Only)',priority:'Recommended',note:'Car is worth under $5K. Drop collision, increase liability limits instead.','cls':'yellow'});
  }
  // Umbrella
  if(save>=2||inc>=2)recs.push({name:'Umbrella Insurance',priority:'Recommended',note:'$1M umbrella policy costs $200-400/year. Worth it when you have significant assets to protect.','cls':'yellow'});
  // Skip list
  let skip=['Extended warranties on electronics','Flight insurance','Rental car insurance (if auto policy covers)','Cancer/accident-specific insurance','Identity theft insurance (if card provides monitoring)'];
  document.getElementById('res').innerHTML=`
  <h2 style="margin-top:20px">Your Insurance Plan</h2>
  <table><thead><tr><th>Insurance</th><th>Priority</th><th>Notes</th></tr></thead><tbody>
  ${recs.map(r=>`<tr><td>${r.name}</td><td><span class="tag tag-${r.cls}">${r.priority}</span></td><td style="font-size:0.85rem">${r.note}</td></tr>`).join('')}
  </tbody></table>
  <div class="result-box" style="margin-top:16px"><h3>What to Skip</h3>
  <div style="font-size:0.9rem">${skip.join(' / ')}</div>
  <div class="sub">These products insure against losses that are either unlikely, manageable, or already covered.</div></div>`;
}
</script>
