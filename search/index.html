<script>
  let searchDebounceTimer;
  let activeCategory = null;

  function initializeSearch() {
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const categoryFilters = document.getElementById('category-filters');

    // Check if blog data is loaded
    if (typeof BLOG_ARTICLES === 'undefined') {
      searchResults.innerHTML = '<p class="no-results-message">Unable to load articles data.</p>';
      return;
    }

    // Extract unique categories
    const categories = [...new Set(BLOG_ARTICLES.map(article => article.category))].sort();

    // Create category filter buttons
    categories.forEach(category => {
      const button = document.createElement('button');
      button.className = 'category-filter';
      button.textContent = category;
      button.addEventListener('click', () => {
        button.classList.toggle('active');
        activeCategory = button.classList.contains('active') ? category : null;
        performSearch();
      });
      categoryFilters.appendChild(button);
    });

    // Search input handler with debounce
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        performSearch();
      }, 300);
    });

    function performSearch() {
      const query = searchInput.value.toLowerCase().trim();
      let results = BLOG_ARTICLES;

      // Filter by search query
      if (query) {
        results = results.filter(article => {
          const title = article.title.toLowerCase();
          const tldr = article.tldr.toLowerCase();
          const category = article.category.toLowerCase();
          const body = (article.body || '').toLowerCase();

          return title.includes(query) ||
                 tldr.includes(query) ||
                 category.includes(query) ||
                 body.includes(query);
        });
      }

      // Filter by category
      if (activeCategory) {
        results = results.filter(article => article.category === activeCategory);
      }

      // Display results
      displayResults(results, query || activeCategory);
    }

    function displayResults(results, searchTerm) {
      const searchResults = document.getElementById('search-results');
      const resultCount = document.getElementById('search-result-count');

      if (results.length === 0) {
        searchResults.innerHTML = `<p class="no-results-message">No articles found${searchTerm ? ' for "' + searchTerm + '"' : ''}.</p>`;
        resultCount.textContent = '';
        return;
      }

      resultCount.textContent = `${results.length}`;
      searchResults.innerHTML = results.map(article => `
        <a href="/blog/${article.slug}.html" class="search-result-card">
          <div class="search-result-header">
            <h2 class="search-result-title">${escapeHtml(article.title)}</h2>
          </div>
          <div class="search-result-meta">
            <span class="search-result-category">${escapeHtml(article.category)}</span>
            <span class="search-result-readtime">${article.readTime} min read</span>
          </div>
          <p class="search-result-excerpt">${escapeHtml(article.tldr)}</p>
        </a>
      `).join('');
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }
  }

  // Initialize when DOM is ready
  document.addEventListener('DOMContentLoaded', initializeSearch);
</script>
