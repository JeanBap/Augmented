<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="JdCJFGDqrO29TMr70TQofnIEMA82gDS7KFFm421UT7Q">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Raise Ready</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #08080d;
  --paper: #f2ede4;
  --gold: #c8a45a;
  --gold2: #e5c97e;
  --dim: #3a3830;
  --mid: #6e6a61;
  --rule: rgba(200,164,90,0.18);
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
  --green: #27ae60;
  --red: #c0392b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--paper); color: var(--ink); font-family: var(--sans); line-height: 1.6; }

/* Login */
.login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { max-width: 360px; width: 100%; padding: 2rem; text-align: center; }
.login-box h1 { font-size: 1.5rem; margin-bottom: 1rem; }
.login-box input {
  width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--rule);
  border-radius: 6px; font-family: var(--mono); font-size: 0.9rem;
  background: var(--paper); color: var(--ink); margin-bottom: 0.75rem;
}
.login-box button {
  width: 100%; padding: 0.75rem; border: none; border-radius: 6px;
  background: var(--ink); color: var(--paper); font-family: var(--sans);
  font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s;
}
.login-box button:hover { opacity: 0.85; }
.login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; display: none; }

/* Dashboard */
.dashboard { display: none; max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
.dash-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem 0; border-bottom: 1px solid var(--rule); margin-bottom: 1.5rem;
}
.dash-header h1 { font-size: 1.3rem; }
.btn-logout {
  padding: 0.4rem 1rem; border: 1.5px solid var(--ink); border-radius: 6px;
  background: transparent; color: var(--ink); font-family: var(--mono);
  font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
}
.btn-logout:hover { background: var(--ink); color: var(--paper); }
.dash-nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.dash-nav button {
  padding: 0.4rem 0.8rem; border: 1px solid var(--rule); border-radius: 6px;
  background: transparent; font-family: var(--mono); font-size: 0.75rem;
  color: var(--mid); cursor: pointer; transition: all 0.2s;
}
.dash-nav button.active, .dash-nav button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* File list */
.file-list { list-style: none; }
.file-list li {
  padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--rule);
  font-family: var(--mono); font-size: 0.82rem; cursor: pointer; transition: background 0.2s;
}
.file-list li:hover { background: rgba(200,164,90,0.08); }

/* Editor */
.editor-panel { display: none; }
.editor-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem;
}
.editor-bar h2 { font-family: var(--mono); font-size: 0.85rem; color: var(--mid); word-break: break-all; }
.editor-actions { display: flex; gap: 0.5rem; }
.editor-actions button {
  padding: 0.5rem 1.2rem; border: none; border-radius: 6px;
  font-family: var(--sans); font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: opacity 0.2s;
}
.btn-save { background: var(--gold); color: var(--ink); }
.btn-save:hover { background: var(--gold2); }
.btn-back { background: transparent; color: var(--mid); border: 1px solid var(--rule) !important; }
.btn-back:hover { color: var(--ink); }
#editor-textarea {
  width: 100%; min-height: 70vh; padding: 1rem; border: 1.5px solid var(--rule);
  border-radius: 8px; font-family: var(--mono); font-size: 0.82rem; line-height: 1.7;
  background: #fff; color: var(--ink); resize: vertical; tab-size: 2;
}
.save-status { font-family: var(--mono); font-size: 0.8rem; color: var(--green); margin-left: 0.5rem; display: none; }
.save-status.error { color: var(--red); }

/* Loading */
.loading { text-align: center; padding: 3rem; font-family: var(--mono); font-size: 0.85rem; color: var(--mid); }

/* Find & Replace */
.dash-header-right { display: flex; gap: 0.5rem; align-items: center; }
.fr-toggle {
  padding: 0.4rem 1rem; border: 1.5px solid var(--gold); border-radius: 6px;
  background: transparent; color: var(--gold); font-family: var(--mono);
  font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
}
.fr-toggle:hover, .fr-toggle.active { background: var(--gold); color: var(--ink); }
.fr-panel { display: none; margin-bottom: 1.5rem; padding: 1.25rem; border: 1.5px solid var(--rule); border-radius: 8px; background: #fff; }
.fr-panel.visible { display: block; }
.fr-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; align-items: center; flex-wrap: wrap; }
.fr-row:last-child { margin-bottom: 0; }
.fr-label { font-family: var(--mono); font-size: 0.75rem; color: var(--mid); min-width: 60px; }
.fr-input {
  flex: 1; padding: 0.5rem 0.75rem; border: 1.5px solid var(--rule); border-radius: 6px;
  font-family: var(--mono); font-size: 0.82rem; background: var(--paper); color: var(--ink); min-width: 200px;
}
.fr-input:focus { outline: none; border-color: var(--gold); }
.fr-btns { display: flex; gap: 0.5rem; }
.btn-fr {
  padding: 0.5rem 1rem; border: none; border-radius: 6px;
  font-family: var(--sans); font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
}
.btn-fr-find { background: var(--ink); color: var(--paper); }
.btn-fr-find:hover { opacity: 0.85; }
.btn-fr-replace { background: var(--gold); color: var(--ink); }
.btn-fr-replace:hover { background: var(--gold2); }
.btn-fr:disabled { opacity: 0.4; cursor: not-allowed; }
.fr-results { margin-top: 0.75rem; font-family: var(--mono); font-size: 0.8rem; color: var(--mid); }
.fr-results ul { list-style: none; margin-top: 0.5rem; max-height: 200px; overflow-y: auto; }
.fr-results li { padding: 0.35rem 0.5rem; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; }
.fr-results .match-count { color: var(--gold); font-weight: 500; }
.fr-status { margin-top: 0.75rem; font-family: var(--mono); font-size: 0.8rem; }
.fr-status.success { color: var(--green); }
.fr-status.error { color: var(--red); }
.fr-status.working { color: var(--gold); }

/* Upload Panel */
.up-panel { display: none; margin-bottom: 1.5rem; padding: 1.25rem; border: 1.5px solid var(--rule); border-radius: 8px; background: #fff; }
.up-panel.visible { display: block; }
.up-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; align-items: center; flex-wrap: wrap; }
.up-row:last-child { margin-bottom: 0; }
.up-label { font-family: var(--mono); font-size: 0.75rem; color: var(--mid); min-width: 70px; }
.up-input {
  flex: 1; padding: 0.5rem 0.75rem; border: 1.5px solid var(--rule); border-radius: 6px;
  font-family: var(--mono); font-size: 0.82rem; background: var(--paper); color: var(--ink); min-width: 200px;
}
.up-input:focus { outline: none; border-color: var(--gold); }
.up-dropzone {
  flex: 1; min-height: 100px; border: 2px dashed var(--rule); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  font-family: var(--mono); font-size: 0.82rem; color: var(--mid); cursor: pointer;
  transition: all 0.2s; position: relative; padding: 1rem;
}
.up-dropzone:hover, .up-dropzone.dragover { border-color: var(--gold); background: rgba(200,164,90,0.06); }
.up-dropzone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.up-file-list { list-style: none; margin-top: 0.5rem; font-family: var(--mono); font-size: 0.78rem; max-height: 160px; overflow-y: auto; }
.up-file-list li {
  padding: 0.35rem 0.5rem; border-bottom: 1px solid var(--rule);
  display: flex; justify-content: space-between; align-items: center;
}
.up-file-list .up-file-name { word-break: break-all; }
.up-file-list .up-file-size { color: var(--mid); white-space: nowrap; margin-left: 0.5rem; }
.up-file-list .up-file-status { margin-left: 0.5rem; font-weight: 500; }
.up-file-list .up-file-status.ok { color: var(--green); }
.up-file-list .up-file-status.fail { color: var(--red); }
.up-file-list .up-file-status.pending { color: var(--mid); }
.btn-up {
  padding: 0.5rem 1.2rem; border: none; border-radius: 6px;
  font-family: var(--sans); font-weight: 700; font-size: 0.85rem; cursor: pointer;
  background: var(--gold); color: var(--ink); transition: all 0.2s;
}
.btn-up:hover { background: var(--gold2); }
.btn-up:disabled { opacity: 0.4; cursor: not-allowed; }
.up-status { margin-top: 0.75rem; font-family: var(--mono); font-size: 0.8rem; }
.up-status.success { color: var(--green); }
.up-status.error { color: var(--red); }
.up-status.working { color: var(--gold); }
.up-progress { width: 100%; height: 4px; background: var(--rule); border-radius: 2px; margin-top: 0.5rem; overflow: hidden; display: none; }
.up-progress-bar { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.3s; width: 0%; }
</style>

  src="https://datafa.st/js/script.js">
</script>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <h1>Admin</h1>
    <p style="font-size:0.85rem;color:var(--mid);margin-bottom:1.5rem;">Raise Ready site editor</p>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
    <button id="login-btn" onclick="doLogin()">Sign in</button>
    <div id="login-error" class="login-error">Wrong password</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
  <div class="dash-header">
    <h1>Site Editor</h1>
    <div class="dash-header-right">
      <button class="fr-toggle" id="indexnow-btn" onclick="triggerIndexNow()">IndexNow</button>
      <button class="fr-toggle" id="fr-toggle" onclick="toggleFindReplace()">Find & Replace</button>
      <button class="fr-toggle" id="up-toggle" onclick="toggleUpload()">Upload</button>
      <button class="btn-logout" onclick="doLogout()">Log out</button>
    </div>
  </div>

  <!-- Find & Replace Panel -->
  <div id="fr-panel" class="fr-panel">
    <div class="fr-row">
      <span class="fr-label">Find</span>
      <input class="fr-input" id="fr-search" type="text" placeholder="Text to find across all pages...">
    </div>
    <div class="fr-row">
      <span class="fr-label">Replace</span>
      <input class="fr-input" id="fr-replace" type="text" placeholder="Replace with...">
    </div>
    <div class="fr-row">
      <div class="fr-btns">
        <button class="btn-fr btn-fr-find" id="fr-find-btn" onclick="doFind()">Preview matches</button>
        <button class="btn-fr btn-fr-replace" id="fr-replace-btn" onclick="doReplace()" disabled>Replace all</button>
      </div>
    </div>
    <div id="fr-results" class="fr-results" style="display:none;"></div>
    <div id="fr-status" class="fr-status" style="display:none;"></div>
  </div>

  <!-- Upload Panel -->
  <div id="up-panel" class="up-panel">
    <div class="up-row">
      <span class="up-label">Folder</span>
      <input class="up-input" id="up-dest" type="text" placeholder="Destination folder, e.g. products/my-product/ or blog/">
    </div>
    <div class="up-row">
      <span class="up-label">Files</span>
      <div class="up-dropzone" id="up-dropzone">
        <span id="up-dropzone-text">Drop files here or click to browse</span>
        <input type="file" id="up-file-input" multiple>
      </div>
    </div>
    <ul class="up-file-list" id="up-file-list"></ul>
    <div class="up-progress" id="up-progress"><div class="up-progress-bar" id="up-progress-bar"></div></div>
    <div id="up-status" class="up-status" style="display:none;"></div>
    <div class="up-row" style="margin-top:0.75rem;">
      <button class="btn-up" id="up-btn" onclick="doUpload()" disabled>Upload files</button>
      <button class="btn-back" onclick="clearUpload()" style="margin-left:0.5rem;">Clear</button>
    </div>
  </div>

  <!-- File browser -->
  <div id="file-browser">
    <div class="dash-nav" id="folder-nav"></div>
    <div id="file-loading" class="loading">Loading files...</div>
    <ul class="file-list" id="file-list"></ul>
  </div>

  <!-- Editor -->
  <div id="editor-panel" class="editor-panel">
    <div class="editor-bar">
      <h2 id="editor-filename"></h2>
      <div class="editor-actions">
        <button class="btn-back" onclick="closeEditor()">Back</button>
        <button class="btn-save" onclick="saveFile()">Save</button>
        <span class="save-status" id="save-status"></span>
      </div>
    </div>
    <textarea id="editor-textarea" spellcheck="false"></textarea>
  </div>
</div>

<script>
(function() {
  'use strict';

  var adminPassword = '';
  var allFiles = [];
  var currentFile = null; // { path, content, sha }
  var folders = ['All', 'blog', 'book', 'services', 'tools', 'templates', 'shared', 'about', 'careers', 'contact'];

  var $login = document.getElementById('login-screen');
  var $dash = document.getElementById('dashboard');
  var $error = document.getElementById('login-error');
  var $pwInput = document.getElementById('password-input');
  var $fileList = document.getElementById('file-list');
  var $fileLoading = document.getElementById('file-loading');
  var $fileBrowser = document.getElementById('file-browser');
  var $editorPanel = document.getElementById('editor-panel');
  var $editorFilename = document.getElementById('editor-filename');
  var $textarea = document.getElementById('editor-textarea');
  var $saveStatus = document.getElementById('save-status');
  var $folderNav = document.getElementById('folder-nav');

  $pwInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

  // Ctrl+S save shortcut in editor
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's' && currentFile) {
      e.preventDefault();
      saveFile();
    }
  });

  window.doLogin = function() {
    adminPassword = $pwInput.value.trim();
    if (!adminPassword) return;
    $error.style.display = 'none';
    loadFileList();
  };

  window.doLogout = function() {
    adminPassword = '';
    allFiles = [];
    currentFile = null;
    $login.style.display = 'flex';
    $dash.style.display = 'none';
    $pwInput.value = '';
  };

  function apiHeaders() {
    return { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword };
  }

  window.triggerIndexNow = function() {
    var btn = document.getElementById('indexnow-btn');
    btn.textContent = 'Submitting...';
    btn.disabled = true;
    // Collect all HTML pages from the sitemap URLs
    var urls = [
      '/', '/book/', '/services/', '/templates/', '/about/', '/contact/', '/blog/', '/careers/', '/search/'
    ];
    // Add all blog articles from the file list if loaded
    allFiles.forEach(function(f) {
      if (f.startsWith('blog/') && f.endsWith('.html') && f !== 'blog/index.html') {
        urls.push('/' + f);
      }
    });
    fetch('/.netlify/functions/indexnow', {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({ urls: urls })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var ok = (data.results || []).filter(function(r) { return r.ok; }).length;
      btn.textContent = 'Sent ' + data.submitted + ' URLs to ' + ok + '/' + (data.results || []).length + ' engines';
      setTimeout(function() { btn.textContent = 'IndexNow'; btn.disabled = false; }, 4000);
    })
    .catch(function() {
      btn.textContent = 'Error';
      setTimeout(function() { btn.textContent = 'IndexNow'; btn.disabled = false; }, 3000);
    });
  };

  function loadFileList() {
    $fileLoading.style.display = 'block';
    $fileList.innerHTML = '';

    fetch('/.netlify/functions/admin-list', { headers: apiHeaders() })
      .then(function(r) {
        if (r.status === 401) { $error.style.display = 'block'; throw new Error('auth'); }
        return r.json();
      })
      .then(function(data) {
        allFiles = data.files;
        $login.style.display = 'none';
        $dash.style.display = 'block';
        $fileLoading.style.display = 'none';
        buildFolderNav();
        renderFiles('All');
      })
      .catch(function(err) {
        if (err.message !== 'auth') { $fileLoading.textContent = 'Error loading files'; }
      });
  }

  function buildFolderNav() {
    $folderNav.innerHTML = '';
    folders.forEach(function(f) {
      var btn = document.createElement('button');
      btn.textContent = f;
      if (f === 'All') btn.classList.add('active');
      btn.addEventListener('click', function() {
        $folderNav.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderFiles(f);
      });
      $folderNav.appendChild(btn);
    });
  }

  function renderFiles(folder) {
    $fileList.innerHTML = '';
    var filtered = folder === 'All' ? allFiles : allFiles.filter(function(f) { return f.startsWith(folder + '/'); });
    filtered.forEach(function(path) {
      var li = document.createElement('li');
      li.textContent = path;
      li.addEventListener('click', function() { openFile(path); });
      $fileList.appendChild(li);
    });
    if (filtered.length === 0) {
      $fileList.innerHTML = '<li style="color:var(--mid);cursor:default;">No HTML files in this folder</li>';
    }
  }

  function openFile(path) {
    $fileBrowser.style.display = 'none';
    $editorPanel.style.display = 'block';
    $editorFilename.textContent = path;
    $textarea.value = 'Loading...';
    $textarea.disabled = true;
    $saveStatus.style.display = 'none';

    fetch('/.netlify/functions/admin-api?path=' + encodeURIComponent(path), { headers: apiHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) { $textarea.value = 'Error: ' + data.error; return; }
        currentFile = { path: data.path, content: data.content, sha: data.sha };
        $textarea.value = data.content;
        $textarea.disabled = false;
      })
      .catch(function() { $textarea.value = 'Error loading file'; });
  }

  window.closeEditor = function() {
    currentFile = null;
    $editorPanel.style.display = 'none';
    $fileBrowser.style.display = 'block';
  };

  window.saveFile = function() {
    if (!currentFile) return;
    $saveStatus.style.display = 'inline';
    $saveStatus.textContent = 'Saving...';
    $saveStatus.classList.remove('error');

    var payload = {
      path: currentFile.path,
      content: $textarea.value,
      sha: currentFile.sha,
      message: 'Admin edit: ' + currentFile.path
    };

    fetch('/.netlify/functions/admin-api', {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify(payload)
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          currentFile.sha = data.sha;
          currentFile.content = $textarea.value;
          $saveStatus.textContent = 'Saved!';
          setTimeout(function() { $saveStatus.style.display = 'none'; }, 2000);
        } else {
          $saveStatus.textContent = 'Error: ' + (data.error || JSON.stringify(data));
          $saveStatus.classList.add('error');
        }
      })
      .catch(function(err) {
        $saveStatus.textContent = 'Network error';
        $saveStatus.classList.add('error');
      });
  };

  // ---- Find & Replace ----
  var $frPanel = document.getElementById('fr-panel');
  var $frToggle = document.getElementById('fr-toggle');
  var $frSearch = document.getElementById('fr-search');
  var $frReplace = document.getElementById('fr-replace');
  var $frResults = document.getElementById('fr-results');
  var $frStatus = document.getElementById('fr-status');
  var $frFindBtn = document.getElementById('fr-find-btn');
  var $frReplaceBtn = document.getElementById('fr-replace-btn');
  var lastMatches = null;

  window.toggleFindReplace = function() {
    $frPanel.classList.toggle('visible');
    $frToggle.classList.toggle('active');
    if ($frPanel.classList.contains('visible')) $frSearch.focus();
  };

  function setFrStatus(msg, cls) {
    $frStatus.style.display = msg ? 'block' : 'none';
    $frStatus.textContent = msg;
    $frStatus.className = 'fr-status' + (cls ? ' ' + cls : '');
  }

  window.doFind = function() {
    var search = $frSearch.value;
    if (!search || search.length < 2) { setFrStatus('Enter at least 2 characters to search.', 'error'); return; }
    $frFindBtn.disabled = true;
    $frReplaceBtn.disabled = true;
    $frResults.style.display = 'none';
    setFrStatus('Searching across all pages...', 'working');

    fetch('/.netlify/functions/admin-replace', {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({ action: 'search', search: search })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        $frFindBtn.disabled = false;
        if (data.error) { setFrStatus('Error: ' + data.error, 'error'); return; }
        lastMatches = data.matches;
        if (data.matches.length === 0) {
          setFrStatus('No matches found.', '');
          $frResults.style.display = 'none';
          $frReplaceBtn.disabled = true;
          return;
        }
        setFrStatus('Found ' + data.total + ' occurrence' + (data.total === 1 ? '' : 's') + ' in ' + data.matches.length + ' file' + (data.matches.length === 1 ? '' : 's') + '.', 'success');
        var html = '<ul>';
        data.matches.forEach(function(m) {
          html += '<li><span>' + m.path + '</span><span class="match-count">' + m.count + ' match' + (m.count === 1 ? '' : 'es') + '</span></li>';
        });
        html += '</ul>';
        $frResults.innerHTML = html;
        $frResults.style.display = 'block';
        $frReplaceBtn.disabled = false;
      })
      .catch(function() {
        $frFindBtn.disabled = false;
        setFrStatus('Network error. Try again.', 'error');
      });
  };

  window.doReplace = function() {
    var search = $frSearch.value;
    var replace = $frReplace.value;
    if (!search || search.length < 2) { setFrStatus('Enter at least 2 characters to search.', 'error'); return; }
    if (search === replace) { setFrStatus('Search and replace strings are identical.', 'error'); return; }

    var fileCount = lastMatches ? lastMatches.length : '?';
    if (!confirm('Replace "' + search + '" with "' + replace + '" across ' + fileCount + ' file(s)?\n\nThis will create a single commit with all changes.')) return;

    $frFindBtn.disabled = true;
    $frReplaceBtn.disabled = true;
    setFrStatus('Replacing across all files... This may take a moment.', 'working');

    fetch('/.netlify/functions/admin-replace', {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({ action: 'replace', search: search, replace: replace })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        $frFindBtn.disabled = false;
        if (data.error) { setFrStatus('Error: ' + data.error, 'error'); return; }
        if (data.changed.length === 0) {
          setFrStatus('No matches found to replace.', '');
          return;
        }
        setFrStatus('Replaced in ' + data.changed.length + ' file' + (data.changed.length === 1 ? '' : 's') + '. Commit: ' + (data.commitSha ? data.commitSha.substring(0, 7) : ''), 'success');
        var html = '<ul>';
        data.changed.forEach(function(p) { html += '<li><span>' + p + '</span><span class="match-count">updated</span></li>'; });
        html += '</ul>';
        $frResults.innerHTML = html;
        $frResults.style.display = 'block';
        $frReplaceBtn.disabled = true;
        lastMatches = null;
      })
      .catch(function() {
        $frFindBtn.disabled = false;
        setFrStatus('Network error. Try again.', 'error');
      });
  };

  // Enter key triggers find in search input
  $frSearch.addEventListener('keydown', function(e) { if (e.key === 'Enter') doFind(); });
  $frReplace.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !$frReplaceBtn.disabled) doReplace(); });

  // ---- Upload ----
  var $upPanel = document.getElementById('up-panel');
  var $upToggle = document.getElementById('up-toggle');
  var $upDest = document.getElementById('up-dest');
  var $upFileInput = document.getElementById('up-file-input');
  var $upFileList = document.getElementById('up-file-list');
  var $upBtn = document.getElementById('up-btn');
  var $upStatus = document.getElementById('up-status');
  var $upProgress = document.getElementById('up-progress');
  var $upProgressBar = document.getElementById('up-progress-bar');
  var $upDropzone = document.getElementById('up-dropzone');
  var uploadQueue = [];

  window.toggleUpload = function() {
    $upPanel.classList.toggle('visible');
    $upToggle.classList.toggle('active');
    // Close find & replace if open
    if ($upPanel.classList.contains('visible')) {
      $frPanel.classList.remove('visible');
      $frToggle.classList.remove('active');
      $upDest.focus();
    }
  };

  // Drag and drop
  $upDropzone.addEventListener('dragover', function(e) { e.preventDefault(); $upDropzone.classList.add('dragover'); });
  $upDropzone.addEventListener('dragleave', function() { $upDropzone.classList.remove('dragover'); });
  $upDropzone.addEventListener('drop', function(e) {
    e.preventDefault();
    $upDropzone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
  $upFileInput.addEventListener('change', function() { handleFiles($upFileInput.files); });

  function handleFiles(fileList) {
    for (var i = 0; i < fileList.length; i++) {
      var f = fileList[i];
      // Prevent duplicates
      var already = uploadQueue.some(function(q) { return q.name === f.name && q.size === f.size; });
      if (!already) uploadQueue.push(f);
    }
    renderUploadList();
    $upBtn.disabled = uploadQueue.length === 0;
    $upFileInput.value = '';
  }

  function renderUploadList() {
    $upFileList.innerHTML = '';
    uploadQueue.forEach(function(f, idx) {
      var li = document.createElement('li');
      var sizeKB = (f.size / 1024).toFixed(1);
      var sizeStr = f.size > 1048576 ? (f.size / 1048576).toFixed(1) + ' MB' : sizeKB + ' KB';
      li.innerHTML = '<span class="up-file-name">' + escHtml(f.name) + '</span>' +
        '<span><span class="up-file-size">' + sizeStr + '</span>' +
        '<span class="up-file-status pending" id="up-status-' + idx + '"></span>' +
        ' <a href="#" onclick="removeUploadFile(' + idx + ');return false;" style="color:var(--red);text-decoration:none;margin-left:0.5rem;" title="Remove">x</a></span>';
      $upFileList.appendChild(li);
    });
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  window.removeUploadFile = function(idx) {
    uploadQueue.splice(idx, 1);
    renderUploadList();
    $upBtn.disabled = uploadQueue.length === 0;
  };

  window.clearUpload = function() {
    uploadQueue = [];
    $upFileList.innerHTML = '';
    $upBtn.disabled = true;
    $upStatus.style.display = 'none';
    $upProgress.style.display = 'none';
    $upProgressBar.style.width = '0%';
    $upDest.value = '';
  };

  function setUpStatus(msg, cls) {
    $upStatus.style.display = msg ? 'block' : 'none';
    $upStatus.textContent = msg;
    $upStatus.className = 'up-status' + (cls ? ' ' + cls : '');
  }

  function readFileAsBase64(file) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function() {
        // result is "data:mime;base64,XXXXX" -- extract just the base64
        var b64 = reader.result.split(',')[1];
        resolve(b64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  window.doUpload = function() {
    if (uploadQueue.length === 0) return;
    var dest = $upDest.value.trim();
    // Normalize: ensure trailing slash if non-empty
    if (dest && !dest.endsWith('/')) dest += '/';
    // Validate dest doesn't have path traversal
    if (dest.includes('..') || dest.startsWith('/')) {
      setUpStatus('Invalid destination folder. No ".." or leading "/" allowed.', 'error');
      return;
    }

    $upBtn.disabled = true;
    $upProgress.style.display = 'block';
    $upProgressBar.style.width = '0%';
    setUpStatus('Uploading ' + uploadQueue.length + ' file(s)...', 'working');

    var total = uploadQueue.length;
    var done = 0;
    var ok = 0;
    var fails = [];

    function uploadNext(idx) {
      if (idx >= total) {
        // All done
        $upProgressBar.style.width = '100%';
        if (fails.length === 0) {
          setUpStatus('All ' + ok + ' file(s) uploaded successfully.', 'success');
        } else {
          setUpStatus(ok + ' uploaded, ' + fails.length + ' failed: ' + fails.join(', '), 'error');
        }
        $upBtn.disabled = false;
        // Refresh file list
        loadFileList();
        return;
      }

      var file = uploadQueue[idx];
      var statusEl = document.getElementById('up-status-' + idx);
      if (statusEl) { statusEl.textContent = ' uploading...'; statusEl.className = 'up-file-status pending'; }

      readFileAsBase64(file).then(function(b64) {
        var fullPath = dest + file.name;
        return fetch('/.netlify/functions/admin-upload', {
          method: 'POST',
          headers: apiHeaders(),
          body: JSON.stringify({ path: dest || '', content: b64, filename: file.name })
        });
      }).then(function(r) { return r.json(); })
      .then(function(data) {
        done++;
        $upProgressBar.style.width = Math.round((done / total) * 100) + '%';
        if (data.ok) {
          ok++;
          if (statusEl) { statusEl.textContent = ' done'; statusEl.className = 'up-file-status ok'; }
        } else {
          fails.push(file.name);
          if (statusEl) { statusEl.textContent = ' ' + (data.error || 'failed'); statusEl.className = 'up-file-status fail'; }
        }
        uploadNext(idx + 1);
      }).catch(function(err) {
        done++;
        fails.push(file.name);
        $upProgressBar.style.width = Math.round((done / total) * 100) + '%';
        if (statusEl) { statusEl.textContent = ' network error'; statusEl.className = 'up-file-status fail'; }
        uploadNext(idx + 1);
      });
    }

    uploadNext(0);
  };

})();
</script>
</body>
</html>
