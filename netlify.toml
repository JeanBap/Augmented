[build]
  command = "node scripts/inject-static-scaffolding.js && node scripts/generate-tag-hubs.js && node scripts/inject-post-seo.js && node scripts/sync-robots-meta.js && node scripts/generate-sitemap.js && node scripts/patch-counters.js && node scripts/ping-search-engines.js"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# Force raisereadybook.netlify.app -> raisereadybook.com
[[redirects]]
  from = "https://raisereadybook.netlify.app/*"
  to = "https://www.raisereadybook.com/:splat"
  status = 301
  force = true

# Legacy slug redirect: sanitised two-sided marketplace post
# Splat pattern avoids embedding the old sanitised substring in config
[[redirects]]
  from = "/blog/how-to-model-a-two-sided-marketplace-lessons*"
  to = "/blog/how-to-model-a-two-sided-marketplace-financial-model.html"
  status = 301
  force = true

# Nav simplification (Apr 2026): /services hidden from nav. Keep page reachable
# for any direct/external link, but funnel browsing users to the start-here flow.
[[redirects]]
  from = "/services"
  to = "/founder-questionnaire.html"
  status = 301
  force = false
[[redirects]]
  from = "/services/"
  to = "/founder-questionnaire.html"
  status = 301
  force = false

# Templates folded into Tools. Keep deep-link to /templates/ working but
# soft-redirect /templates -> /tools so any old menu link lands on the new home.
[[redirects]]
  from = "/templates"
  to = "/tools/#premium-templates"
  status = 301
  force = false

# Force the .html canonical for blog and tools. Both /foo and /foo.html were
# returning 200 (Netlify Pretty URLs not configured), which Search Console
# flagged as duplicate content. Canonicals across 380 blog files and 250+
# tools already point to .html, so force the extensionless variant to
# 301-redirect to the .html canonical instead of rewriting all the canonical
# tags.
#
# Netlify processes static files BEFORE applying redirects, so /blog/foo.html
# serves the actual file directly and never hits this rule. Only the
# extensionless /blog/foo path falls through to the redirect.
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug.html"
  status = 301
  force = false

[[redirects]]
  from = "/tools/:slug"
  to = "/tools/:slug.html"
  status = 301
  force = false

# Pillar guides folded into Blog. Keep deep links to individual pillars working
# (they still live at /pillars/<topic>/) but redirect the index to /blog/.
[[redirects]]
  from = "/pillars"
  to = "/blog/"
  status = 301
  force = false
[[redirects]]
  from = "/pillars/"
  to = "/blog/"
  status = 301
  force = false

# Paid product files live under /products/<guid>/<file>. The GUIDs are not
# secret (products.js is in a public repo) so we must block direct access.
# Real downloads should go through /.netlify/functions/download which verifies
# Stripe payment before issuing a signed URL or buffered response.
[[redirects]]
  from = "/products/*"
  to = "/404"
  status = 404
  force = true

# Defence-in-depth: even if a /products/ path is fetched directly, search
# engines never index it.
[[headers]]
  for = "/products/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://js.stripe.com https://datafa.st https://connect.facebook.net https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://calendly.com https://api.stripe.com https://datafa.st https://*.supabase.co wss://*.supabase.co; frame-src https://js.stripe.com; frame-ancestors 'none';"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets (saves Netlify bandwidth)
[[headers]]
  for = "/jobboard/supabase.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/tools/fm-deps.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/tools/xlsx.full.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/tools/jspdf.umd.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/tools/html2canvas.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/shared/*.css"
  [headers.values]
        Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/shared/*.js"
  [headers.values]
        Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.ico"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
